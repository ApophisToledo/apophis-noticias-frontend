<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Apophis Noticias - Noticia</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{margin:0;font-family:Georgia;background:#f4e3b2;color:#111;transition:.3s;}
body.dark{background:#111;color:#f0e68c;}
.header{background:black;color:gold;padding:25px;display:flex;justify-content:center;align-items:center;gap:10px;position:relative;cursor:pointer;}
.header span.title{font-size:2rem;cursor:pointer;}
.eyes{display:inline-block;font-size:1.5rem;animation:blink 4s infinite;}
@keyframes blink{0%,90%,100%{transform:scaleY(1);}95%{transform:scaleY(0.1);}}

.contenedor-noticia{max-width:900px;margin:20px auto;padding:20px;position:relative;border-radius:12px;color:#fff;}
.contenedor-noticia h1{font-size:3rem;font-weight:bold;margin-bottom:10px;text-shadow:2px 2px 6px #000;}
.contenedor-noticia p{font-size:1.1rem;line-height:1.6;text-shadow:1px 1px 4px #000;}

button{
  margin:3px;
  padding:5px 8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  box-shadow:0 3px 6px rgba(0,0,0,0.2);
  transition:.3s;
}
button:hover{opacity:0.85;}
.like{background:green;color:white;}
.dislike{background:red;color:white;}
.sorpresa{background:orange;color:white;}
.tristeza{background:blue;color:white;}
.enojo{background:darkred;color:white;}
.admin-btn{position:absolute;right:15px;top:50%;transform:translateY(-50%);background:gold;color:black;font-size:0.9rem;opacity:0.9;}
.cat-btn{margin:5px;padding:8px 12px;border-radius:8px;background:#111;color:gold;cursor:pointer;}
.cat-btn:hover{background:gold;color:black;}
body.dark .contenedor-noticia{background:rgba(34,34,34,0.7);}
body.dark button{opacity:0.9;color:black;}
body.dark .cat-btn{background:#f0e68c;color:#111;}
body.dark .cat-btn:hover{background:#111;color:gold;}

.comentario{margin-top:10px;padding:10px;border:1px solid #ccc;border-radius:5px;background:rgba(255,255,255,0.8);}
.comentario p{margin:0;font-weight:bold;}
.not-relacionadas{display:flex;flex-wrap:wrap;gap:15px;margin-top:20px;}
.not-relacionadas .card{flex:1;min-width:200px;max-width:300px;height:180px;background-size:cover;background-position:center;display:flex;align-items:flex-end;color:white;padding:10px;border-radius:10px;text-shadow:1px 1px 4px #000;cursor:pointer;transition:.3s;}
.not-relacionadas .card:hover{transform:scale(1.05);}

#ultimasNoticias{background:red;color:white;padding:10px;overflow:hidden;white-space:nowrap;font-weight:bold;font-size:1.1rem;cursor:pointer;}
#ultimasNoticias span{display:inline-block;margin-right:50px;animation:scrollNews 20s linear infinite;}
@keyframes scrollNews{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}

button.toggle-dark{position:fixed;bottom:10px;right:10px;padding:10px;border-radius:50%;cursor:pointer;z-index:100;font-size:1.2rem;border:none;transition:.3s;background:gold;color:black;opacity:0.9;}
body.dark button.toggle-dark{background:#f0e68c;color:#111;}
</style>

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6641245592697930" crossorigin="anonymous"></script>

</head>
<body>

<div class="header">
  <span class="eyes">𓂀</span>
  <span class="eyes">𓁹</span>
  <span class="title" onclick="location='index.html'">APOPHIS NOTICIAS</span>
  <span class="eyes">𓁹</span>
  <span class="eyes">𓂀</span>
  <button class="admin-btn" onclick="loginAdmin()">Admin</button>
</div>

<div id="ultimasNoticias"></div>

<div style="text-align:center;margin:15px;">
  <button class="cat-btn" onclick="verCat('politica')">Política</button>
  <button class="cat-btn" onclick="verCat('deportes')">Deportes</button>
  <button class="cat-btn" onclick="verCat('policiales')">Policiales</button>
  <button class="cat-btn" onclick="verCat('arte')">Arte</button>
  <button class="cat-btn" onclick="verCat('show')">Show</button>
  <button class="cat-btn" onclick="verCat('pais')">País</button>
  <button class="cat-btn" onclick="verCat('mundo')">Mundo</button>
  <button class="cat-btn" onclick="verCat('ciudad')">Ciudad</button>
</div>

<div class="contenedor-noticia" id="noticia"></div>

<h2 style="text-align:center;margin-top:30px;">Noticias relacionadas</h2>
<div class="not-relacionadas" id="relacionadas"></div>

<h2 style="margin-top:30px;">Comentarios</h2>
<div id="comentarios"></div>
<div style="margin-top:10px;">
  <input type="text" id="nombre" placeholder="Tu nombre" style="padding:5px;border-radius:5px;">
  <textarea id="texto" placeholder="Comentario" style="width:100%;margin-top:5px;padding:5px;border-radius:5px;"></textarea>
  <button onclick="agregarComentario()">Comentar</button>
</div>

<button class="toggle-dark" onclick="toggleDark()">🌙</button>

<script>
const API="https://apophis-noticias-backend.vercel.app";
const contenedor=document.getElementById("noticia");
const ultimasNoticias=document.getElementById("ultimasNoticias");
const relacionadasDiv=document.getElementById("relacionadas");
const comentariosDiv=document.getElementById("comentarios");

function toggleDark(){
  document.body.classList.toggle("dark");
  document.querySelectorAll(".cat-btn").forEach(c=>c.classList.toggle("dark"));
  document.querySelector(".toggle-dark").textContent = document.body.classList.contains("dark")?"☀️":"🌙";
}

function loginAdmin(){
  const user=prompt("Usuario Admin:");
  const pass=prompt("Contraseña:");
  const usuarios=[{usuario:"Apophis", password:"1234"},{usuario:"Benja357", password:"abcd"}];
  const encontrado = usuarios.find(u => u.usuario===user && u.password===pass);
  if(encontrado){ location="admin.html"; }
  else{ alert("Usuario o contraseña incorrecta"); }
}

async function cargarUltimas(){
  const res=await fetch(API+"/noticias");
  const data=await res.json();
  ultimasNoticias.innerHTML = data.map(n=>`<span onclick="ir('${n._id}')">${n.titulo}</span>`).join("");
}

async function cargarNoticia(){
  const id=new URLSearchParams(window.location.search).get("id");
  const res=await fetch(API+"/noticias/"+id);
  const n=await res.json();

  contenedor.style.backgroundImage = `url('${n.imagen}')`;
  contenedor.style.backgroundSize = "cover";
  contenedor.style.backgroundPosition = "center";
  contenedor.innerHTML = `<h1>${n.titulo}</h1><p>${n.contenido}</p>
  <div style="margin-top:10px;">
    <button class="like" onclick="toggleReaccion(event,'like','${n._id}')">👍 ${n.likes}</button>
    <button class="dislike" onclick="toggleReaccion(event,'dislike','${n._id}')">👎 ${n.dislikes}</button>
    <button class="sorpresa" onclick="toggleReaccion(event,'sorpresa','${n._id}')">😮 ${n.sorpresa}</button>
    <button class="tristeza" onclick="toggleReaccion(event,'tristeza','${n._id}')">😢 ${n.tristeza}</button>
    <button class="enojo" onclick="toggleReaccion(event,'enojo','${n._id}')">😡 ${n.enojo}</button>
  </div>`;

  cargarRelacionadas(n.categoria,n._id);
  cargarComentarios(n._id);
}

async function cargarRelacionadas(categoria,actual){
  const res=await fetch(API+"/noticias/categoria/"+categoria);
  const data=await res.json();
  relacionadasDiv.innerHTML = data.filter(n=>n._id!==actual).map(n=>`
    <div class="card" style="background-image:url('${n.imagen}')" onclick="ir('${n._id}')">
      ${n.titulo}
    </div>`).join("");
}

async function cargarComentarios(id){
  const res=await fetch(API+"/noticias/comentarios/"+id);
  const data=await res.json();
  comentariosDiv.innerHTML = data.map(c=>`<div class="comentario"><p>${c.nombre}</p>${c.texto}</div>`).join("");
}

async function agregarComentario(){
  const id=new URLSearchParams(window.location.search).get("id");
  const nombre=document.getElementById("nombre").value;
  const texto=document.getElementById("texto").value;
  if(nombre && texto){
    await fetch(API+"/noticias/comentario/"+id,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({nombre,texto})
    });
    document.getElementById("nombre").value="";
    document.getElementById("texto").value="";
    cargarComentarios(id);
  }else{
    alert("Nombre y comentario son obligatorios");
  }
}

async function toggleReaccion(e,tipo,id){
  e.stopPropagation();
  const key = tipo+"_"+id;
  if(localStorage.getItem(key)){
    await fetch(API+"/noticias/unreaccion/"+tipo+"/"+id,{method:"POST"});
    localStorage.removeItem(key);
  }else{
    await fetch(API+"/noticias/reaccion/"+tipo+"/"+id,{method:"POST"});
    localStorage.setItem(key,true);
  }
  cargarNoticia();
}

function ir(id){location="noticia.html?id="+id;}
function verCat(cat){location="categoria.html?cat="+cat;}

window.onload=()=>{cargarUltimas();cargarNoticia();}
</script>

</body>
</html>
