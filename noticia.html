<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Noticia - Apophis Noticias</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#f4e3b2;font-family:serif;margin:0;padding:0;}
.header{background:#111;color:white;padding:20px;text-align:center;position:sticky;top:0;z-index:10;font-size:2rem;}
.header span{display:inline-block;margin:0 15px;animation:ojos 1.5s infinite alternate;}
@keyframes ojos{from{transform:scale(1);} to{transform:scale(1.3);}}
.button{background:black;color:white;padding:5px 10px;border-radius:5px;margin:5px;cursor:pointer;}
.button:hover{background:gold;color:black;}
.card{background:#fff8dc;border-left:5px solid gold;padding:15px;border-radius:10px;margin:10px;}
textarea{width:100%;padding:5px;border-radius:5px;margin-top:5px;}
</style>
</head>
<body>

<div class="header"><span>𓂀</span> Apophis Noticias <span>𓂀</span></div>
<button onclick="volverInicio()" class="button">← Inicio</button>

<div id="noticia" class="card"></div>

<h3>Comentarios</h3>
<div id="comentarios"></div>
<textarea id="comentario" placeholder="Escribe un comentario"></textarea>
<button onclick="comentar()" class="button">Enviar</button>

<script>
const API="https://apophis-noticias-backend.vercel.app";
const id=new URLSearchParams(location.search).get("id");
let token=localStorage.getItem("token");
let user=localStorage.getItem("user");

function volverInicio(){ location="index.html"; }

async function cargar(){
  const res=await fetch(API+"/noticias/"+id);
  const n=await res.json();
  n.likes=n.likes||[]; n.dislikes=n.dislikes||[]; n.comentarios=n.comentarios||[];

  document.getElementById("noticia").innerHTML=`
    <h1>${n.titulo}</h1>
    ${n.imagen?`<img src="${n.imagen}" class="w-full mt-2 mb-2">`:''}
    ${n.video?`<video src="${n.video}" controls class="w-full mb-2"></video>`:''}
    <p>${n.contenido}</p>
    <p>👍 ${n.likes.length} <button onclick="like()" class="button">Like</button>
       👎 ${n.dislikes.length} <button onclick="dislike()" class="button">No me gusta</button></p>
  `;

  document.getElementById("comentarios").innerHTML=n.comentarios.map(c=>`
    <div class="card">
      💬 ${c.user}: ${c.texto} ${c.user===user?`<button onclick="borrarComentario('${c._id}')" class="button">❌</button>`:''}
    </div>
  `).join("");
}

async function like(){ if(!token){alert("Debes ingresar"); return;} await fetch(API+"/noticias/"+id+"/like",{method:"POST",headers:{Authorization:token}}); cargar(); }
async function dislike(){ if(!token){alert("Debes ingresar"); return;} await fetch(API+"/noticias/"+id+"/dislike",{method:"POST",headers:{Authorization:token}}); cargar(); }

async function comentar(){
  if(!token){alert("Debes ingresar"); return;}
  const texto=document.getElementById("comentario").value;
  if(!texto) return;
  await fetch(API+"/noticias/"+id+"/comentario",{method:"POST",headers:{"Content-Type":"application/json","Authorization":token},body:JSON.stringify({texto})});
  document.getElementById("comentario").value="";
  cargar();
}

async function borrarComentario(cid){
  await fetch(API+"/noticias/"+id+"/comentario/"+cid,{method:"DELETE",headers:{Authorization:token}});
  cargar();
}

window.onload=cargar;
</script>

</body>
</html>
