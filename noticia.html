<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Apophis Noticias</title>
<script src="https://cdn.tailwindcss.com"></script>
<meta name="description" content="Detalle de noticia en Apophis Noticias">
<style>
body{margin:0;font-family:Georgia;background:#f4e3b2;color:#111;transition:.3s;}
body.dark{background:#111;color:#f0e68c;}
.header{background:black;color:gold;padding:25px;display:flex;justify-content:center;align-items:center;gap:10px;position:relative;cursor:pointer;}
.header span.title{font-size:2rem;cursor:pointer;}
.eyes{display:inline-block;font-size:1.5rem;animation:blink 4s infinite;}
@keyframes blink{0%,90%,100%{transform:scaleY(1);}95%{transform:scaleY(0.1);}}

/* NUEVO estilo tipo diario */
.noticia-container{
  max-width:900px;
  margin:20px auto;
  padding:20px;
  background:#f4e3b2;
  border-radius:12px;
  box-shadow:0 5px 12px rgba(0,0,0,0.25);
}
.noticia-titulo{
  font-size:2.8rem;
  font-weight:bold;
  margin-bottom:15px;
  text-align:center;
}
.noticia-img{
  width:100%;
  height:420px;
  background-size:cover;
  background-position:center;
  border-radius:12px;
  margin-bottom:20px;
}
.noticia-texto{
  font-size:1.25rem;
  line-height:1.8;
}

/* Categorías */
.cat-bar{
  text-align:center;
  margin:15px;
}
.cat-btn{
  margin:5px;
  padding:8px 12px;
  border-radius:8px;
  background:#111;
  color:gold;
  cursor:pointer;
}

/* Comentarios */
.comentarios{margin-top:30px;}
.comentario{background:rgba(255,255,255,0.85);border-radius:8px;padding:10px;margin-bottom:10px;}
.form-comentario input,.form-comentario textarea{
  width:100%;margin:5px 0;padding:6px;border-radius:6px;border:1px solid #111;
}

/* Relacionadas */
.relacionadas{display:flex;flex-wrap:wrap;gap:15px;margin-top:30px;}
.relacionada-card{width:200px;height:120px;background-size:cover;background-position:center;border-radius:8px;cursor:pointer;position:relative;}
.relacionada-card h4{position:absolute;bottom:0;width:100%;background:rgba(0,0,0,0.6);color:gold;text-align:center;}

.reactions button{margin-right:5px;}
button.toggle-dark{position:fixed;bottom:10px;right:10px;padding:10px;border-radius:50%;background:gold;}
</style>
</head>
<body>

<div class="header">
  <span class="eyes">𓂀</span>
  <span class="eyes">𓁹</span>
  <span class="title" onclick="location.href='index.html'">APOPHIS NOTICIAS</span>
  <span class="eyes">𓁹</span>
  <span class="eyes">𓂀</span>
</div>

<!-- NUEVO: CATEGORIAS -->
<div class="cat-bar">
  <button class="cat-btn" onclick="verCat('politica')">Política</button>
  <button class="cat-btn" onclick="verCat('deportes')">Deportes</button>
  <button class="cat-btn" onclick="verCat('policiales')">Policiales</button>
  <button class="cat-btn" onclick="verCat('arte')">Arte</button>
  <button class="cat-btn" onclick="verCat('show')">Show</button>
  <button class="cat-btn" onclick="verCat('pais')">País</button>
  <button class="cat-btn" onclick="verCat('mundo')">Mundo</button>
  <button class="cat-btn" onclick="verCat('ciudad')">Ciudad</button>
</div>

<div class="noticia-container" id="noticiaContainer"></div>

<h3 style="margin-top:20px;">Comentarios</h3>

<!-- NUEVO: FORMULARIO -->
<div class="form-comentario">
  <input type="text" id="nombre" placeholder="Tu nombre">
  <textarea id="textoComentario" placeholder="Escribe tu comentario"></textarea>
  <button onclick="enviarComentario()">Comentar</button>
</div>

<div class="comentarios" id="comentarios"></div>

<h3 style="text-align:center;margin-top:20px;">Noticias relacionadas</h3>
<div class="relacionadas" id="relacionadas"></div>

<button class="toggle-dark" onclick="toggleDark()">🌙</button>

<script>
const API="https://apophis-noticias-backend.vercel.app";
let noticiaActual="";

function toggleDark(){
  document.body.classList.toggle("dark");
}

function verCat(cat){
  location.href="categoria.html?cat="+cat;
}

function ir(id){
  location="noticia.html?id="+id;
}

async function cargarNoticia(){
  const id = new URLSearchParams(window.location.search).get('id');
  if(!id) return;

  noticiaActual=id;

  const res = await fetch(API+"/noticias/"+id);
  const n = await res.json();

  const cont=document.getElementById("noticiaContainer");
  cont.innerHTML = `
    <h1 class="noticia-titulo">${n.titulo}</h1>
    <div class="noticia-img" style="background-image:url('${n.imagen}')"></div>
    <div class="noticia-texto">${n.contenido}</div>

    <div class="reactions">
      <button onclick="reaccion('${id}','like')">👍 ${n.likes}</button>
      <button onclick="reaccion('${id}','dislike')">👎 ${n.dislikes}</button>
      <button onclick="reaccion('${id}','sorpresa')">😲 ${n.sorpresa}</button>
      <button onclick="reaccion('${id}','tristeza')">😢 ${n.tristeza}</button>
      <button onclick="reaccion('${id}','enojo')">😡 ${n.enojo}</button>
    </div>
  `;

  // comentarios
  document.getElementById("comentarios").innerHTML =
    n.comentarios.map(c=>`<div class="comentario"><strong>${c.nombre}</strong>: ${c.texto}</div>`).join("");

  // relacionadas
  const resRel=await fetch(API+"/noticias/categoria/"+n.categoria);
  const dataRel=await resRel.json();
  document.getElementById("relacionadas").innerHTML =
    dataRel.filter(r=>r._id!==n._id).map(r=>`
      <div class="relacionada-card" style="background-image:url('${r.imagen}')" onclick="ir('${r._id}')">
        <h4>${r.titulo}</h4>
      </div>
    `).join("");
}

// ✅ SOLO 1 REACCION
async function reaccion(id,tipo){
  const key="reaccion_"+id;

  if(localStorage.getItem(key)){
    alert("Ya reaccionaste a esta noticia");
    return;
  }

  await fetch(API+"/noticias/"+id+"/reaccion/"+tipo,{method:"POST"});
  localStorage.setItem(key,tipo);
  cargarNoticia();
}

// ✅ ENVIAR COMENTARIO
async function enviarComentario(){
  const nombre=document.getElementById("nombre").value;
  const texto=document.getElementById("textoComentario").value;

  if(!nombre || !texto){
    alert("Completa todos los campos");
    return;
  }

  await fetch(API+"/noticias/"+noticiaActual+"/comentario",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({nombre,texto})
  });

  document.getElementById("nombre").value="";
  document.getElementById("textoComentario").value="";

  cargarNoticia();
}

window.onload=cargarNoticia;
</script>
</body>
</html>
