<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Noticia</title>

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-TU_ID"
crossorigin="anonymous"></script>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0;font-family:Georgia;background:#f4e3b2;color:#111;}
body.dark{background:#111;color:#f0e68c;}

.container{max-width:900px;margin:auto;padding:15px;}
.card{background:#fff8dc;padding:15px;border-radius:12px;}
body.dark .card{background:#222;}
</style>
</head>

<body>

<div class="container">

<h3 id="visitas"></h3>

<div id="noticia" class="card"></div>

<!-- ADS -->
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-TU_ID"
data-ad-slot="123456"
data-ad-format="auto"></ins>

</div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
const id=new URLSearchParams(location.search).get("id");

// VISITAS
async function visitas(){
  const r=await fetch(API+"/visitas");
  const d=await r.json();
  document.getElementById("visitas").innerText="👁 "+d.visitas;
}

async function cargar(){
  const r=await fetch(API+"/noticias/"+id);
  const n=await r.json();

  noticia.innerHTML=`
    <h1>${n.titulo}</h1>
    <p>${n.contenido}</p>
    <p>👁 ${n.vistas}</p>
  `;

  (adsbygoogle = window.adsbygoogle || []).push({});
}

window.onload=()=>{
  visitas();
  cargar();
};
</script>

</body>
</html>
