<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Noticia</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background:#f4e3b2;
  font-family:serif;
}
</style>

</head>

<body class="p-6">

<a href="index.html" class="bg-black text-white px-3 py-1 rounded">← Volver</a>

<div id="n"></div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
const id=new URLSearchParams(location.search).get("id");

async function cargar(){
  const res=await fetch(API+"/noticias/"+id);
  const n=await res.json();

  document.title=n.titulo;

  document.getElementById("n").innerHTML=`
    <h1 class="text-3xl">${n.titulo}</h1>
    ${n.imagen?`<img src="${n.imagen}" class="my-3">`:""}
    <p>${n.contenido}</p>
  `;
}

cargar();
</script>

</body>
</html>
