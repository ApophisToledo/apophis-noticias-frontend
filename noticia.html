<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Apophis Noticias - Noticia</title>
<meta name="description" content="Detalle de noticia en Apophis Noticias">
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{margin:0;font-family:Georgia;background:#f4e3b2;color:#111;transition:.3s;}
body.dark{background:#111;color:#f0e68c;}
.header{background:black;color:gold;padding:25px;display:flex;justify-content:center;align-items:center;gap:10px;position:relative;cursor:pointer;}
.header span.title{font-size:2rem;cursor:pointer;}
.eyes{display:inline-block;font-size:1.5rem;animation:blink 4s infinite;}
@keyframes blink{0%,90%,100%{transform:scaleY(1);}95%{transform:scaleY(0.1);}}
.noticia-container{max-width:900px;margin:20px auto;padding:15px;background:rgba(255,255,255,0.95);border-radius:12px;box-shadow:0 3px 6px rgba(0,0,0,0.3);position:relative;transition:.5s;}
.noticia-container.dark{background:rgba(0,0,0,0.85);color:#f0e68c;}
.noticia-titulo{font-size:2.5rem;font-weight:bold;margin-bottom:15px;text-align:center;}
.noticia-img{width:100%;height:400px;background-size:cover;background-position:center;border-radius:12px;margin-bottom:15px;}
.noticia-texto{font-size:1.2rem;line-height:1.6;}
.button{margin:3px;padding:5px 8px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;box-shadow:0 3px 6px rgba(0,0,0,0.2);transition:.3s;}
.button:hover{opacity:0.85;}
.reactions{display:flex;gap:5px;margin-top:10px;}
.reactions button{background:#111;color:gold;border-radius:6px;padding:5px;cursor:pointer;transition:.3s;}
.reactions button:hover{background:gold;color:black;}
.comments{margin-top:20px;}
.comments h3{margin-bottom:10px;}
.comment{margin-bottom:8px;padding:5px;background:#f0e68c;border-radius:6px;}
.comment.dark{background:#222;color:#f0e68c;}
input.comment-input{width:80%;padding:5px;margin-right:5px;border-radius:6px;border:1px solid #111;}
button.comment-btn{padding:5px 10px;border-radius:6px;border:none;background:#111;color:gold;cursor:pointer;}
button.comment-btn:hover{background:gold;color:black;}
.related{margin-top:30px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
.related .card{width:200px;height:120px;background-size:cover;background-position:center;border-radius:8px;cursor:pointer;transition:.3s;box-shadow:0 3px 6px rgba(0,0,0,0.2);}
.related .card:hover{transform:scale(1.05);}
button.toggle-dark{position:fixed;bottom:10px;right:10px;padding:10px;border-radius:50%;cursor:pointer;z-index:100;font-size:1.2rem;border:none;transition:.3s;background:gold;color:black;opacity:0.9;}
body.dark button.toggle-dark{background:#f0e68c;color:#111;}
</style>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6641245592697930" crossorigin="anonymous"></script>
</head>

<body>
<div class="header">
  <span class="eyes">𓂀</span>
  <span class="eyes">𓁹</span>
  <span class="title" onclick="location.href='index.html'">APOPHIS NOTICIAS</span>
  <span class="eyes">𓁹</span>
  <span class="eyes">𓂀</span>
  <button class="admin-btn" onclick="loginAdmin()">Admin</button>
</div>

<div class="noticia-container" id="noticiaContainer">
  <div class="noticia-titulo" id="titulo"></div>
  <div class="noticia-img" id="imagen"></div>
  <div class="noticia-texto" id="texto"></div>
  <div class="reactions">
    <button onclick="reaccion('like')">👍 Me gusta</button>
    <button onclick="reaccion('dislike')">👎 No me gusta</button>
    <button onclick="reaccion('wow')">😲 Me sorprende</button>
    <button onclick="reaccion('sad')">😢 Me entristece</button>
    <button onclick="reaccion('angry')">😡 Me enoja</button>
  </div>

  <div class="comments">
    <h3>Comentarios</h3>
    <div id="commentList"></div>
    <input type="text" id="commentName" class="comment-input" placeholder="Tu nombre">
    <input type="text" id="commentText" class="comment-input" placeholder="Escribe un comentario">
    <button class="comment-btn" onclick="enviarComentario()">Comentar</button>
  </div>

  <div class="related" id="related"></div>
</div>

<button class="toggle-dark" onclick="toggleDark()">🌙</button>

<script>
const API="https://apophis-noticias-backend.vercel.app";
const urlParams=new URLSearchParams(window.location.search);
const id=urlParams.get('id');

function toggleDark(){
  document.body.classList.toggle("dark");
  document.querySelector(".noticia-container").classList.toggle("dark");
  document.querySelector(".toggle-dark").textContent = document.body.classList.contains("dark")?"☀️":"🌙";
}

function loginAdmin(){
  const user=prompt("Usuario Admin:");
  const pass=prompt("Contraseña:");
  const usuarios=[{usuario:"Apophis", password:"1234"},{usuario:"Benja357", password:"abcd"}];
  const encontrado = usuarios.find(u => u.usuario===user && u.password===pass);
  if(encontrado){ location="admin.html"; }
  else{ alert("Usuario o contraseña incorrecta"); }
}

async function cargarNoticia(){
  const res=await fetch(API+"/noticia/"+id);
  const n=await res.json();
  document.getElementById("titulo").textContent=n.titulo;
  document.getElementById("imagen").style.backgroundImage=`url('${n.imagen}')`;
  document.getElementById("texto").innerHTML=n.texto;

  // Cargar comentarios
  const comRes=await fetch(API+"/comentarios/"+id);
  const comentarios=await comRes.json();
  const lista=document.getElementById("commentList");
  lista.innerHTML=comentarios.map(c=>`<div class="comment ${document.body.classList.contains('dark')?'dark':''}"><b>${c.nombre}:</b> ${c.texto}</div>`).join("");

  // Noticias relacionadas
  const relRes=await fetch(API+"/noticias?categoria="+n.categoria);
  const related=document.getElementById("related");
  related.innerHTML=relRes.json().then(data=>{
    return data.filter(r=>r._id!==id).map(r=>`<div class="card" style="background-image:url('${r.imagen}')"
      onclick="location.href='noticia.html?id=${r._id}'" title="${r.titulo}"></div>`).join("");
  });
}

async function reaccion(tipo){
  await fetch(API+"/reaccion",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tipo,id})});
  alert("Reacción: "+tipo);
}

async function enviarComentario(){
  const nombre=document.getElementById("commentName").value;
  const texto=document.getElementById("commentText").value;
  if(!nombre||!texto)return alert("Completa ambos campos");
  await fetch(API+"/comentario",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id,nombre,texto})});
  document.getElementById("commentName").value="";
  document.getElementById("commentText").value="";
  cargarNoticia();
}

window.onload=cargarNoticia;
</script>
</body>
</html>
