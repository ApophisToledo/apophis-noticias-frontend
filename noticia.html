<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Apophis Noticias - Noticia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Detalle de noticia en Apophis Noticias">
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{margin:0;font-family:Georgia;background:#f4e3b2;color:#111;transition:.3s;}
body.dark{background:#111;color:#f0e68c;}
.header{background:black;color:gold;padding:25px;display:flex;justify-content:center;align-items:center;gap:10px;position:relative;cursor:pointer;}
.header span.title{font-size:2rem;cursor:pointer;}
.eyes{display:inline-block;font-size:1.5rem;animation:blink 4s infinite;}
@keyframes blink{0%,90%,100%{transform:scaleY(1);}95%{transform:scaleY(0.1);}}
.noticia-container{max-width:900px;margin:20px auto;padding:15px;background:rgba(255,255,255,0.95);border-radius:12px;box-shadow:0 3px 6px rgba(0,0,0,0.3);transition:.5s;}
.noticia-container.dark{background:rgba(0,0,0,0.85);color:#f0e68c;}
.noticia-titulo{font-size:2.5rem;font-weight:bold;margin-bottom:15px;text-align:center;}
.noticia-img{width:100%;height:400px;background-size:cover;background-position:center;border-radius:12px;margin-bottom:15px;}
.noticia-texto{font-size:1.2rem;line-height:1.6;}
.relacionadas{display:flex;flex-wrap:wrap;gap:15px;margin-top:30px;}
.relacionada-card{width:200px;height:120px;background-size:cover;background-position:center;border-radius:8px;cursor:pointer;position:relative;transition:.3s;box-shadow:0 3px 6px rgba(0,0,0,0.2);}
.relacionada-card:hover{transform:scale(1.05);}
.relacionada-card h4{position:absolute;bottom:0;width:100%;background:rgba(0,0,0,0.6);color:gold;text-align:center;padding:2px 5px;border-bottom-left-radius:8px;border-bottom-right-radius:8px;}
button.toggle-dark{position:fixed;bottom:10px;right:10px;padding:10px;border-radius:50%;cursor:pointer;z-index:100;font-size:1.2rem;border:none;transition:.3s;background:gold;color:black;opacity:0.9;}
body.dark button.toggle-dark{background:#f0e68c;color:#111;}
</style>
</head>
<body>
<div class="header">
  <span class="eyes">𓂀</span>
  <span class="eyes">𓁹</span>
  <span class="title" onclick="location.href='index.html'">APOPHIS NOTICIAS</span>
  <span class="eyes">𓁹</span>
  <span class="eyes">𓂀</span>
  <button class="admin-btn" onclick="loginAdmin()">Admin</button>
</div>

<div class="noticia-container" id="noticiaContainer"></div>
<h3 style="text-align:center;margin-top:20px;">Noticias relacionadas</h3>
<div class="relacionadas" id="relacionadas"></div>
<button class="toggle-dark" onclick="toggleDark()">🌙</button>

<script>
const API="https://apophis-noticias-backend.vercel.app";

function toggleDark(){
  document.body.classList.toggle("dark");
  document.querySelector(".noticia-container").classList.toggle("dark");
  document.querySelector(".toggle-dark").textContent = document.body.classList.contains("dark")?"☀️":"🌙";
}

function loginAdmin(){
  const user=prompt("Usuario Admin:");
  const pass=prompt("Contraseña:");
  const usuarios=[{usuario:"Apophis", password:"1234"},{usuario:"Benja357", password:"abcd"}];
  const encontrado = usuarios.find(u => u.usuario===user && u.password===pass);
  if(encontrado){ location="admin.html"; }
  else{ alert("Usuario o contraseña incorrecta"); }
}

function ir(id){location="noticia.html?id="+id;}

async function cargarNoticia(){
  const urlParams = new URLSearchParams(window.location.search);
  const id = urlParams.get('id');
  if(!id) return;

  const res = await fetch(`${API}/noticias/${id}`);
  const n = await res.json();
  const cont=document.getElementById("noticiaContainer");
  cont.innerHTML = `<h1 class="noticia-titulo">${n.titulo}</h1>
                    <div class="noticia-img" style="background-image:url('${n.imagen}')"></div>
                    <div class="noticia-texto">${n.contenido}</div>`;

  const resRel=await fetch(`${API}/noticias/categoria/${n.categoria}`);
  const dataRel=await resRel.json();
  const rel=document.getElementById("relacionadas");
  rel.innerHTML = dataRel.filter(r=>r._id!==n._id).map(r=>{
    let img=r.imagen? r.imagen : "https://via.placeholder.com/200x120.png?text=Sin+Imagen";
    return `<div class="relacionada-card" style="background-image:url('${img}')" onclick="ir('${r._id}')">
              <h4>${r.titulo}</h4>
            </div>`;
  }).join("");
}

window.onload=cargarNoticia;
</script>
</body>
</html>
