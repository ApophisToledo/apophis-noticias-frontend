<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Noticia</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-4">

<a href="index.html">← Volver</a>

<div id="n"></div>

<textarea id="comentario"></textarea>
<button onclick="comentar()">Enviar</button>

<script>
const API="https://apophis-noticias-backend.vercel.app";
const id=new URLSearchParams(location.search).get("id");

async function cargar(){
  const res=await fetch(API+"/noticias/"+id);
  const n=await res.json();

  document.getElementById("n").innerHTML=`
    <h1>${n.titulo}</h1>
    ${n.imagen?`<img src="${n.imagen}">`:""}
    <p>${n.contenido}</p>

    <button onclick="like()">👍 ${n.likes}</button>

    ${n.comentarios.map(c=>`<p>💬 ${c.texto}</p>`).join("")}
  `;
}

async function like(){
  await fetch(API+"/noticias/"+id+"/like",{method:"POST"});
  cargar();
}

async function comentar(){
  await fetch(API+"/noticias/"+id+"/comentario",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({texto:comentario.value})
  });

  cargar();
}

cargar();
</script>

</body>
</html>
