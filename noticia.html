<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#f4e3b2;font-family:Georgia;}
img{border-radius:10px;}
</style>
</head>

<body class="p-4">

<a href="index.html">← Volver</a>

<div id="n"></div>

<textarea id="comentario" class="border w-full mt-4"></textarea>
<button onclick="comentar()">Enviar</button>

<script>
const API="https://apophis-noticias-backend.vercel.app";
const id=new URLSearchParams(location.search).get("id");

async function cargar(){
  const res=await fetch(API+"/noticias/"+id);
  const n=await res.json();

  document.getElementById("n").innerHTML=`
    <h1 class="text-3xl mb-4">${n.titulo}</h1>
    ${n.imagen?`<img src="${n.imagen}" class="mb-4">`:""}
    <p class="text-lg mb-4">${n.contenido}</p>

    <button onclick="like()">👍 ${n.likes.length}</button>
    <button onclick="dislike()">👎 ${n.dislikes.length}</button>

    <h3 class="mt-4">Comentarios</h3>
    ${n.comentarios.map(c=>`
      <p>${c.texto} - ${c.user}
      ${c.user===localStorage.getItem("user")?
      `<button onclick="borrar('${c.id}')">❌</button>`:""}
      </p>
    `).join("")}
  `;
}

async function like(){
  await fetch(API+"/noticias/"+id+"/like",{method:"POST",headers:{Authorization:localStorage.getItem("token")}});
  cargar();
}

async function dislike(){
  await fetch(API+"/noticias/"+id+"/dislike",{method:"POST",headers:{Authorization:localStorage.getItem("token")}});
  cargar();
}

async function comentar(){
  await fetch(API+"/noticias/"+id+"/comentario",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:localStorage.getItem("token")
    },
    body:JSON.stringify({texto:comentario.value})
  });
  cargar();
}

async function borrar(cid){
  await fetch(API+"/comentario/"+id+"/"+cid,{
    method:"DELETE",
    headers:{Authorization:localStorage.getItem("token")}
  });
  cargar();
}

cargar();
</script>

</body>
</html>
