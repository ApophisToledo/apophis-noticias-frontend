<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Noticia</title>

<style>
body{
  font-family:Georgia;
  background:#f4e3b2;
  padding:20px;
}

.container{
  max-width:800px;
  margin:auto;
  background:#fff8dc;
  padding:20px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

button{
  padding:8px 12px;
  margin:5px;
  border-radius:6px;
  border:none;
  cursor:pointer;
  transition:.3s;
}
button:hover{transform:scale(1.05);}

.comentario{
  background:#eee;
  padding:10px;
  border-radius:6px;
  margin:5px 0;
}
</style>
</head>

<body>

<div class="container">

<button onclick="volver()">⬅ Volver</button>

<div id="n"></div>

<h3>Relacionadas</h3>
<div id="rel"></div>

<h3>Comentarios</h3>
<input id="comentario">
<button onclick="comentar()">Enviar</button>

<div id="comentarios"></div>

</div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
const id=new URLSearchParams(location.search).get("id");

let userId=localStorage.getItem("userId");
if(!userId){
  userId=Date.now().toString();
  localStorage.setItem("userId",userId);
}

let categoriaActual="";

async function cargar(){
  const res=await fetch(API+"/noticias/"+id);
  const data=await res.json();

  categoriaActual=data.categoria;

  n.innerHTML=`
    <h1>${data.titulo}</h1>
    ${data.imagen?`<img src="${data.imagen}" width="100%">`:''}
    <p>${data.contenido}</p>

    <p>👁 ${data.vistas}</p>

    <button onclick="like()">👍 ${data.likes}</button>
    <button onclick="dislike()">👎 ${data.dislikes}</button>
  `;

  renderComentarios(data.comentarios);
  relacionadas();
}

async function relacionadas(){
  const res=await fetch(API+"/noticias/categoria/"+categoriaActual);
  const data=await res.json();

  rel.innerHTML=data.slice(0,3).map(n=>`
    <div onclick="ir('${n._id}')">${n.titulo}</div>
  `).join("");
}

function renderComentarios(lista){
  comentarios.innerHTML=lista.map(c=>`
    <div class="comentario">
      ${c.texto}
      ${c.userId===userId?`<button onclick="borrar('${c.id}')">X</button>`:''}
    </div>
  `).join("");
}

async function comentar(){
  await fetch(API+"/noticias/"+id+"/comentario",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({texto:comentario.value,userId})
  });
  comentario.value="";
  cargar();
}

async function borrar(cid){
  await fetch(API+"/noticias/"+id+"/comentario/"+cid,{
    method:"DELETE",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({userId})
  });
  cargar();
}

async function like(){await fetch(API+"/noticias/"+id+"/like",{method:"POST"});cargar();}
async function dislike(){await fetch(API+"/noticias/"+id+"/dislike",{method:"POST"});cargar();}

function volver(){location="index.html";}
function ir(id){location="noticia.html?id="+id;}

cargar();
</script>

</body>
</html>
