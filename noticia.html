<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Noticia</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#f4e3b2;font-family:Georgia;margin:0;padding:0;}
.header{background:#111;color:white;padding:20px;text-align:center;position:sticky;top:0;z-index:10;font-size:2rem;}
.button{background:black;color:white;padding:5px 10px;border-radius:5px;margin:5px;cursor:pointer;}
.button:hover{background:gold;color:black;}
.card{background:#fff8dc;border-left:5px solid gold;padding:15px;border-radius:10px;margin:10px;transition:.3s;}
textarea{width:100%;padding:5px;border-radius:5px;margin-top:5px;}
</style>
</head>
<body>

<div class="header">𓂀 Apophis Noticias 𓂀</div>
<button onclick="volverInicio()" class="button">← Inicio</button>

<div id="noticia" class="card"></div>

<h3>Comentarios</h3>
<div id="comentarios"></div>
<textarea id="comentario" placeholder="Escribe un comentario"></textarea>
<button onclick="comentar()" class="button">Enviar</button>

<script>
const API="https://apophis-noticias-backend.vercel.app";
const id=new URLSearchParams(location.search).get("id");
const urlParams = new URLSearchParams(window.location.search);
const admin = urlParams.get("admin") === "true";

function volverInicio(){ location="index.html"+(admin?"?admin=true":""); }

async function cargar(){
  const res = await fetch(API+"/noticias/"+id);
  const n = await res.json();
  n.comentarios = n.comentarios||[];

  document.getElementById("noticia").innerHTML=`
    <h1>${n.titulo}</h1>
    ${n.imagen?`<img src="${n.imagen}" class="w-full mt-2 mb-2">`:''}
    <p>${n.contenido}</p>
  `;

  document.getElementById("comentarios").innerHTML = n.comentarios.map(c=>`
    <div class="card">💬 ${c.user}: ${c.texto}</div>
  `).join("");
}

async function comentar(){
  const texto=document.getElementById("comentario").value;
  if(!texto) return;
  await fetch(API+"/noticias/"+id+"/comentario",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({texto})});
  document.getElementById("comentario").value="";
  cargar();
}

cargar();
</script>
</body>
</html>
