<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- ✅ SEO AVANZADO -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Apophis Noticias - Información actualizada de Política, Deportes, Policiales, Arte, Show, Ciudad, País y Mundo.">
<meta name="keywords" content="noticias argentina, noticias rosario, politica, deportes, policiales, actualidad">
<meta name="robots" content="index, follow">

<title>Apophis Noticias</title>

<!-- ✅ OPEN GRAPH -->
<meta property="og:title" content="Apophis Noticias">
<meta property="og:description" content="Noticias actualizadas de Argentina y el mundo">
<meta property="og:type" content="website">
<meta property="og:url" content="https://TU-DOMINIO.vercel.app">
<meta property="og:image" content="https://TU-DOMINIO.vercel.app/logo.png">

<meta name="twitter:card" content="summary_large_image">

<script type="application/ld+json" id="jsonld"></script>

<!-- ✅ ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6641245592697930" crossorigin="anonymous"></script>

<script src="https://cdn.tailwindcss.com"></script>

<style>
/* 🔥 CSS ORIGINAL + mejoras */
body{margin:0;font-family:Georgia;background:#f4e3b2;color:#111;transition:.3s;}
body.dark{background:#111;color:#f0e68c;}
.header{background:black;color:gold;padding:25px;display:flex;justify-content:center;align-items:center;gap:10px;position:relative;cursor:pointer;}
.header span.title{font-size:2rem;cursor:pointer;display:flex;align-items:center;gap:10px;}
.eyes{display:inline-block;font-size:1.5rem;animation:blink 4s infinite;}
@keyframes blink{0%,90%,100%{transform:scaleY(1);}95%{transform:scaleY(0.1);}}

.cat-btn{margin:5px;padding:8px 12px;border-radius:8px;background:#111;color:gold;cursor:pointer;transition:.3s;}
.cat-btn:hover{background:gold;color:black;}

.main-layout{display:flex;max-width:1200px;margin:auto;gap:20px;}
.noticia-container{flex:0 0 65%;padding:15px;background:#f4e3b2;border-radius:12px;box-shadow:0 3px 6px rgba(0,0,0,0.3);}
.sidebar-left, .sidebar-right{flex:0 0 17.5%;}
.sidebar-left{display:flex;flex-direction:column;gap:20px;}
.sidebar-right{display:flex;flex-direction:column;gap:10px;}

.noticia-titulo{font-size:2.5rem;font-weight:bold;text-align:center;margin-bottom:10px;}
.noticia-img{width:100%;height:400px;background-size:cover;background-position:center;border-radius:12px;margin-bottom:15px;}
.noticia-texto{font-size:1.2rem;line-height:1.6;text-align:justify;}

.info-noticia{text-align:center;font-size:0.9rem;margin-bottom:10px;opacity:0.8;}

.reactions{display:flex;gap:5px;margin-top:10px;}
.reactions button{padding:6px 12px;border-radius:6px;background:#111;color:gold;cursor:pointer;transition:.3s;}
.reactions button:hover{background:gold;color:black;}

.comentario{background:rgba(255,255,255,0.8);border-radius:8px;padding:8px;margin-bottom:10px;}
.titulo-comentarios{display:inline-block;background:#111;color:gold;padding:6px 12px;border-radius:8px;font-weight:bold;margin-bottom:5px;}
.btn-comentar{background:#111;color:gold;padding:8px 12px;border-radius:8px;margin-top:5px;cursor:pointer;}
.btn-comentar:hover{background:gold;color:black;}

.relacionada-card{width:100%;height:100px;margin-bottom:10px;background-size:cover;background-position:center;border-radius:8px;cursor:pointer;position:relative;}
.relacionada-card h4{position:absolute;bottom:0;width:100%;background:rgba(0,0,0,0.6);color:gold;text-align:center;padding:2px;}

.ad-box{margin:20px 0;text-align:center;}

button.toggle-dark{position:fixed;bottom:10px;right:10px;background:gold;}
footer{margin-top:40px;padding:20px;text-align:center;background:#111;color:gold;}
footer a{color:gold;margin:0 10px;}

@media(max-width:900px){
  .main-layout{flex-direction:column;}
  .sidebar-left, .sidebar-right, .noticia-container{flex:1;}
}
</style>
</head>

<body>

<!-- HEADER CON OJOS IGUALES AL INDEX -->
<div class="header" onclick="location.href='index.html'">
  <span class="eyes">𓂀</span>
  <span class="eyes">𓁹</span>
  <span class="title">APOPHIS NOTICIAS</span>
  <span class="eyes">𓁹</span>
  <span class="eyes">𓂀</span>
</div>

<!-- BOTÓN VOLVER AL INICIO -->
<div style="margin:10px;">
  <button class="cat-btn" onclick="location.href='index.html'">🏠 Volver al Inicio</button>
</div>

<!-- CATEGORÍAS IGUALES AL INDEX -->
<div style="text-align:center;margin:15px;">
  <button class="cat-btn" onclick="verCat('Politica')">Política</button>
  <button class="cat-btn" onclick="verCat('Deportes')">Deportes</button>
  <button class="cat-btn" onclick="verCat('Policiales')">Policiales</button>
  <button class="cat-btn" onclick="verCat('Arte')">Arte</button>
  <button class="cat-btn" onclick="verCat('Show')">Show</button>
  <button class="cat-btn" onclick="verCat('Pais')">País</button>
  <button class="cat-btn" onclick="verCat('Mundo')">Mundo</button>
  <button class="cat-btn" onclick="verCat('Ciudad')">Ciudad</button>
</div>

<!-- CONTENIDO CON SIDEBARS Y NOTICIA CENTRADA -->
<div class="main-layout">
  <div class="sidebar-left">
    <div class="ad-box">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-6641245592697930"
           data-ad-slot="1234567890"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
  </div>

  <div class="noticia-container" id="noticiaContainer"></div>

  <div class="sidebar-right" id="relacionadas"></div>
</div>

<!-- COMENTARIOS ABAJO -->
<div style="max-width:900px;margin:auto;margin-top:20px;">
  <div class="titulo-comentarios">💬 Comentarios</div>
  <div id="comentarios"></div>
  <div style="margin-top:10px;">
    <input id="nombre" type="text" placeholder="Tu nombre" style="padding:6px;border-radius:6px;width:40%;margin-right:5px;">
    <input id="textoComentario" type="text" placeholder="Escribe tu comentario..." style="padding:6px;border-radius:6px;width:45%;margin-right:5px;">
    <button class="btn-comentar" onclick="enviarComentario()">Comentar</button>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 Apophis Noticias</p>
  <div>
    <a href="privacidad.html">Privacidad</a> |
    <a href="contacto.html">Contacto</a> |
    <a href="sobre.html">Sobre Nosotros</a>
  </div>
</footer>

<script>
const API="https://apophis-noticias-backend.vercel.app";
let noticiaActual="";

function verCat(cat){location.href="categoria.html?cat="+cat;}
function ir(id){location="noticia.html?id="+id;}

async function cargarNoticia(){
  const id = new URLSearchParams(window.location.search).get('id');
  if(!id) return;

  noticiaActual=id;
  const res = await fetch(API+"/noticias/"+id);
  const n = await res.json();
  const urlActual = window.location.href;
  const fecha = new Date(parseInt(n._id.substring(0,8),16)*1000);
  const fechaFormateada = fecha.toLocaleDateString() + " " + fecha.toLocaleTimeString();

  // SEO dinámico
  document.title = n.titulo + " | Apophis Noticias";
  document.querySelector("meta[property='og:title']").content = n.titulo;
  document.querySelector("meta[property='og:description']").content = n.titulo;
  document.querySelector("meta[property='og:image']").content = n.imagen;
  document.querySelector("meta[property='og:url']").content = urlActual;

  // JSON-LD
  document.getElementById("jsonld").textContent = JSON.stringify({
    "@context":"https://schema.org",
    "@type":"NewsArticle",
    "headline":n.titulo,
    "image":[n.imagen],
    "datePublished":fecha.toISOString(),
    "author":{"@type":"Organization","name":"Apophis Noticias"},
    "publisher":{"@type":"Organization","name":"Apophis Noticias"},
    "mainEntityOfPage":{"@type":"WebPage","@id":urlActual}
  });

  // Contenedor noticia
  document.getElementById("noticiaContainer").innerHTML = `
    <h1 class="noticia-titulo">${n.titulo}</h1>
    <div class="info-noticia">✍️ Redacción Apophis | 🕒 ${fechaFormateada}</div>
    <div class="noticia-img" style="background-image:url('${n.imagen}')"></div>
    <div class="noticia-texto">${n.contenido}</div>
    <div class="reactions">
      <button onclick="reaccion('${id}','like')">👍 ${n.likes}</button>
      <button onclick="reaccion('${id}','dislike')">👎 ${n.dislikes}</button>
      <button onclick="reaccion('${id}','sorpresa')">😲 ${n.sorpresa}</button>
      <button onclick="reaccion('${id}','tristeza')">😢 ${n.tristeza}</button>
      <button onclick="reaccion('${id}','enojo')">😡 ${n.enojo}</button>
    </div>
  `;

  // Relacionadas
  const resRel = await fetch(API+"/noticias/categoria/"+n.categoria);
  const dataRel = await resRel.json();
  document.getElementById("relacionadas").innerHTML =
    dataRel.filter(r=>r._id!==n._id).map(r=>`
      <div class="relacionada-card" style="background-image:url('${r.imagen}')" onclick="ir('${r._id}')">
        <h4>${r.titulo}</h4>
      </div>
    `).join("");

  // Comentarios
  document.getElementById("comentarios").innerHTML =
    n.comentarios.map(c=>`<div class="comentario"><strong>${c.nombre}</strong>: ${c.texto}</div>`).join("");
}

async function reaccion(id,tipo){
  const key="reaccion_"+id;
  if(localStorage.getItem(key)===tipo){
    await fetch(API+"/noticias/"+id+"/unreaccion/"+tipo,{method:"POST"});
    localStorage.removeItem(key);
  }else{
    await fetch(API+"/noticias/"+id+"/reaccion/"+tipo,{method:"POST"});
    localStorage.setItem(key,tipo);
  }
  cargarNoticia();
}

async function enviarComentario(){
  const nombre = document.getElementById("nombre").value;
  const texto = document.getElementById("textoComentario").value;
  if(!nombre || !texto){ alert("Completa los campos"); return; }
  await fetch(API+"/noticias/"+noticiaActual+"/comentario",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({nombre,texto})
  });
  document.getElementById("nombre").value="";
  document.getElementById("textoComentario").value="";
  cargarNoticia();
}

window.onload=cargarNoticia;
</script>

</body>
</html>
