<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body style="background:#f4e3b2">

<h1 style="text-align:center">Panel Admin</h1>

<input id="titulo" placeholder="Título">

<select id="categoria">
<option value="politica">Política</option>
<option value="deportes">Deportes</option>
<option value="policiales">Policiales</option>
<option value="arte">Arte</option>
<option value="show">Show</option>
<option value="pais">País</option>
<option value="mundo">Mundo</option>
<option value="ciudad">Ciudad</option>
</select>

<input type="file" id="img">

<div id="contenido" contenteditable="true" style="border:1px solid #ccc;height:150px;"></div>

<button onclick="crear()">Crear</button>

<script>
const API="https://apophis-noticias-backend.vercel.app";

async function crear(){
  const fd=new FormData();
  fd.append("file",img.files[0]);

  const up=await fetch(API+"/upload",{method:"POST",body:fd});
  const u=await up.json();

  await fetch(API+"/noticias",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      titulo:titulo.value,
      contenido:contenido.innerHTML,
      categoria:categoria.value,
      imagen:u.url
    })
  });

  alert("Creado");
}
</script>

</body>
</html>
