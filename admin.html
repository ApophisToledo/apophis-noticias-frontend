<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin - Apophis Noticias</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{margin:0;font-family:Georgia;background:#f4e3b2;color:#111;transition:.3s;}
body.dark{background:#111;color:#f0e68c;}
.header{background:black;color:gold;padding:25px;display:flex;justify-content:center;align-items:center;gap:10px;position:relative;}
.header span.title{font-size:2rem;}
.container{max-width:1000px;margin:20px auto;padding:20px;background:rgba(255,255,255,0.95);border-radius:12px;box-shadow:0 3px 6px rgba(0,0,0,0.3);transition:.5s;}
.container.dark{background:rgba(0,0,0,0.85);color:#f0e68c;}
input, select, textarea{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:1px solid #111;}
button{padding:8px 12px;margin-top:5px;border:none;border-radius:8px;background:#111;color:gold;cursor:pointer;font-weight:bold;box-shadow:0 3px 6px rgba(0,0,0,0.2);transition:.3s;}
button:hover{opacity:0.85;}
.news-box{display:flex;flex-wrap:wrap;gap:15px;margin-top:20px;}
.news-card{width:220px;height:150px;background-size:cover;background-position:center;border-radius:8px;cursor:pointer;position:relative;transition:.3s;box-shadow:0 3px 6px rgba(0,0,0,0.2);}
.news-card:hover{transform:scale(1.05);}
.news-card .news-title{position:absolute;bottom:0;width:100%;background:rgba(0,0,0,0.6);color:gold;text-align:center;font-weight:bold;border-bottom-left-radius:8px;border-bottom-right-radius:8px;padding:3px;}
img.pasted{max-width:100%;border-radius:6px;margin-top:5px;}
.toggle-dark{position:fixed;bottom:10px;right:10px;padding:10px;border-radius:50%;cursor:pointer;z-index:100;font-size:1.2rem;border:none;transition:.3s;background:gold;color:black;opacity:0.9;}
body.dark .toggle-dark{background:#f0e68c;color:#111;}
.edit-btn, .delete-btn{padding:3px 6px;margin:2px;border-radius:6px;border:none;font-weight:bold;cursor:pointer;}
.edit-btn{background:gold;color:black;}
.edit-btn:hover{opacity:0.85;}
.delete-btn{background:red;color:white;}
.delete-btn:hover{opacity:0.85;}
</style>
</head>

<body>
<div class="header">
  <span class="title">ADMIN - APOPHIS NOTICIAS</span>
  <button onclick="toggleDark()">🌙</button>
</div>

<div class="container">
  <h2>Crear / Editar Noticia</h2>
  <input type="hidden" id="noticiaId">
  <label>Título:</label>
  <input type="text" id="titulo">
  <label>Texto:</label>
  <div contenteditable="true" id="textoEditor" style="width:100%;min-height:150px;padding:8px;border:1px solid #111;border-radius:6px;" placeholder="Pega aquí tu noticia"></div>
  <label>Categoría:</label>
  <select id="categoria">
    <option value="Pais">Pais</option>
    <option value="Ciudad">Ciudad</option>
    <option value="Mundo">Mundo</option>
    <option value="Politica">Política</option>
    <option value="Deportes">Deportes</option>
    <option value="Policiales">Policiales</option>
    <option value="Arte">Arte</option>
    <option value="Show">Show</option>
  </select>
  <label>Imagen de portada (copiar y pegar):</label>
  <div contenteditable="true" id="imagenEditor" style="border:1px solid #111;padding:5px;border-radius:6px;" placeholder="Pega la imagen aquí"></div>
  <button onclick="guardarNoticia()">Guardar Noticia</button>

  <h2>Noticias existentes</h2>
  <div class="news-box" id="newsBox"></div>
</div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
let TOKEN="";

// Login al abrir admin
async function loginAdmin(){
  const user=prompt("Usuario Admin:");
  const pass=prompt("Contraseña:");
  const res = await fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user,pass})});
  if(res.status!==200){ alert("Usuario o contraseña incorrecta"); return; }
  const data = await res.json();
  TOKEN = data.token;
}
loginAdmin();

function toggleDark(){
  document.body.classList.toggle("dark");
  document.querySelector(".container").classList.toggle("dark");
  document.querySelector(".toggle-dark").textContent = document.body.classList.contains("dark")?"☀️":"🌙";
}

async function cargarNoticias(){
  const res=await fetch(API+"/noticias");
  const noticias=await res.json();
  const box=document.getElementById("newsBox");
  box.innerHTML="";
  noticias.forEach(n=>{
    const div=document.createElement("div");
    div.className="news-card";
    div.style.backgroundImage=`url('${n.imagen}')`;
    div.innerHTML=`<div class="news-title">${n.titulo}</div>
                     <button class="edit-btn" onclick="editarNoticia(${JSON.stringify(n).replace(/"/g,'&quot;')})">Editar</button>
                     <button class="delete-btn" onclick="borrarNoticia('${n._id}')">Borrar</button>`;
    box.appendChild(div);
  });
}

function editarNoticia(n){
  document.getElementById("noticiaId").value=n._id;
  document.getElementById("titulo").value=n.titulo;
  document.getElementById("textoEditor").innerHTML=n.contenido;
  document.getElementById("categoria").value=n.categoria;
  document.getElementById("imagenEditor").innerHTML=`<img src="${n.imagen}" class="pasted">`;
}

async function borrarNoticia(id){
  if(confirm("¿Seguro que quieres borrar esta noticia?")){
    await fetch(API+"/noticias/"+id,{method:"DELETE", headers:{Authorization:"Bearer "+TOKEN}});
    cargarNoticias();
  }
}

async function guardarNoticia(){
  const id=document.getElementById("noticiaId").value;
  const titulo=document.getElementById("titulo").value;
  const contenido=document.getElementById("textoEditor").innerHTML;
  const categoria=document.getElementById("categoria").value;
  const imgTag=document.querySelector("#imagenEditor img");
  const imagen=imgTag?imgTag.src:"";
  const body={titulo,contenido,categoria,imagen};
  if(id){
    await fetch(API+"/noticias/"+id,{method:"PUT",headers:{"Content-Type":"application/json","Authorization":"Bearer "+TOKEN},body:JSON.stringify(body)});
  }else{
    await fetch(API+"/noticias",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+TOKEN},body:JSON.stringify(body)});
  }
  document.getElementById("titulo").value="";
  document.getElementById("textoEditor").innerHTML="";
  document.getElementById("imagenEditor").innerHTML="";
  document.getElementById("noticiaId").value="";
  cargarNoticias();
}

window.onload=cargarNoticias;
</script>
</body>
</html>
