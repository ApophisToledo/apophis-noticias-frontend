<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-4">

<h1 class="text-2xl mb-2">Panel Admin</h1>

<input id="titulo" placeholder="Título" class="border p-2 w-full mb-2">
<input id="temaIA" placeholder="Tema IA" class="border p-2 w-full mb-2">

<button onclick="usarIA()" class="bg-blue-500 text-white p-2 mb-2">Generar con IA</button>

<div id="contenido" contenteditable="true" class="border p-2 mb-2"></div>

<button onclick="crear()" class="bg-green-500 text-white p-2">Crear</button>

<h2 class="mt-4">Noticias</h2>
<div id="lista"></div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
let token=null;

async function login(){
  const user=prompt("User");
  const pass=prompt("Pass");

  const r=await fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user,pass})});
  const d=await r.json();
  token=d.token;
}

async function usarIA(){
  const tema=document.getElementById("temaIA").value;

  const r=await fetch(API+"/ia",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tema})});
  const d=await r.json();

  titulo.value=d.titulo;
  contenido.innerHTML=d.contenido;
}

async function crear(){
  await fetch(API+"/noticias",{
    method:"POST",
    headers:{"Content-Type":"application/json",Authorization:"Bearer "+token},
    body:JSON.stringify({
      titulo:titulo.value,
      contenido:contenido.innerHTML
    })
  });
  cargar();
}

async function editar(id){
  const nuevo=prompt("Nuevo título");
  await fetch(API+"/noticias/"+id,{
    method:"PUT",
    headers:{"Content-Type":"application/json",Authorization:"Bearer "+token},
    body:JSON.stringify({titulo:nuevo})
  });
  cargar();
}

async function eliminar(id){
  await fetch(API+"/noticias/"+id,{
    method:"DELETE",
    headers:{Authorization:"Bearer "+token}
  });
  cargar();
}

async function cargar(){
  const r=await fetch(API+"/noticias");
  const d=await r.json();

  lista.innerHTML=d.map(n=>`
    <div>
      ${n.titulo}
      <button onclick="editar('${n._id}')">Editar</button>
      <button onclick="eliminar('${n._id}')">Eliminar</button>
    </div>
  `).join("");
}

window.onload=async()=>{
  await login();
  cargar();
}
</script>

</body>
</html>
