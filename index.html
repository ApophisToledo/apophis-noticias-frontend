<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Apophis Noticias</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#f4e3b2;font-family:Georgia;margin:0;}
.header{background:black;color:white;padding:20px;text-align:center;font-size:2rem;}
.ticker{background:red;color:white;overflow:hidden;white-space:nowrap;}
.ticker span{
  display:inline-block;
  padding-left:100%;
  animation:ticker 15s linear infinite;
}
@keyframes ticker{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}
</style>
</head>

<body>

<div class="header">𓂀 Apophis Noticias</div>

<!-- 🔴 TICKER TV -->
<div class="ticker">
  <span id="tickerText">Cargando últimas noticias...</span>
</div>

<div style="padding:10px;">
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Clave">
<button onclick="login()">Admin</button>
</div>

<script>
const API="https://apophis-noticias-backend.vercel.app";

// 🔐 LOGIN
async function login(){
  const res = await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user:user.value,password:pass.value})
  });

  const data = await res.json();

  if(data.token){
    localStorage.setItem("token", data.token);
    location="admin.html";
  }else{
    alert("Error login");
  }
}

// 🔴 TICKER (FIX ERROR JSON)
async function cargarTicker(){
  try{
    const res = await fetch(API+"/noticias");
    if(!res.ok) return;

    const text = await res.text();
    if(!text) return;

    const data = JSON.parse(text);

    const titulos = data.slice(0,5).map(n=>n.titulo).join(" 🔴 ");
    document.getElementById("tickerText").innerText = titulos;

  }catch(e){
    console.log("Ticker error:", e);
  }
}

cargarTicker();
setInterval(cargarTicker, 10000);
</script>

</body>
</html>
