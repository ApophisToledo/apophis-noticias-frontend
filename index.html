<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apophis Noticias - Rosario y Argentina</title>
<meta name="description" content="Apophis Noticias: noticias locales, nacionales e internacionales en deportes, política, policiales, arte y entretenimiento.">

<!-- SEO / Open Graph -->
<meta property="og:title" content="Apophis Noticias - Rosario y Argentina">
<meta property="og:description" content="Mantente informado con Apophis Noticias, noticias locales y del mundo.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://apophis-noticias-frontend.onrender.com/">
<meta property="og:image" content="https://apophis-noticias-frontend.onrender.com/og-image.png">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Apophis Noticias - Rosario y Argentina">
<meta name="twitter:description" content="Mantente informado con Apophis Noticias.">
<meta name="twitter:image" content="https://apophis-noticias-frontend.onrender.com/og-image.png">

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(#fdf6e3,#f4e3b2);
  font-family: "Papyrus", fantasy;
  color: #000;
}
header {
  background-color: #d4af37;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
}
.card {
  background:#fff7d1;
  border:2px solid #d4af37;
  border-radius:12px;
  padding:1rem;
  transition: transform 0.2s, opacity 0.5s;
  opacity:0;
}
.card.show { opacity:1; }
button { cursor:pointer; }
input { border:1px solid #d4af37; border-radius:6px; padding:0.3rem; }
.category-btn { cursor:pointer; padding:0.3rem 0.6rem; background:#d4af37; color:#000; border-radius:6px; margin:2px; display:inline-block; }
.category-btn.active { background:#b9973d; }
</style>
</head>
<body>

<header class="p-5 text-center">
<h1 class="text-4xl font-bold">𓂀 Apophis Noticias 𓂀</h1>
<p class="mt-1 text-lg">Noticias de Rosario, Argentina y el mundo</p>
</header>

<div class="p-5 text-center">
<button class="category-btn active" data-cat="">Todas</button>
<button class="category-btn" data-cat="Deportes">Deportes</button>
<button class="category-btn" data-cat="Política">Política</button>
<button class="category-btn" data-cat="Policiales">Policiales</button>
<button class="category-btn" data-cat="Arte">Arte</button>
<button class="category-btn" data-cat="Entretenimiento">Entretenimiento</button>
</div>

<main id="contenedor" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 p-6">
<p>Cargando noticias...</p>
</main>

<!-- PUBLICIDAD -->
<div class="text-center my-6">
<p>Publicidad</p>
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="TU_ID"
     data-ad-slot="123456"
     data-ad-format="auto"></ins>
<script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
</div>

<!-- GOOGLE ANALYTICS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config','G-XXXXXXXXXX'); // Reemplaza por tu ID GA4
</script>

<script>
const API = "https://apophis-noticias-backend.vercel.app";

async function cargar(categoria="") {
  try {
    const url = categoria ? `${API}/noticias?categoria=${categoria}` : `${API}/noticias`;
    const res = await fetch(url);
    const data = await res.json();
    const contenedor = document.getElementById("contenedor");

    if(!data.length){
      contenedor.innerHTML = "<p>No hay noticias todavía</p>";
      return;
    }

    contenedor.innerHTML = data.map((n,i)=>`
      <div class="card" style="transition-delay:${i*0.1}s">
        <h2 class="text-xl font-bold mb-2">${n.titulo}</h2>
        <img src="${n.imagen||''}" alt="${n.titulo}" class="mb-2 w-full rounded">
        <p class="mb-3">${n.contenido}</p>
        <button onclick="like('${n._id}')" class="bg-yellow-700 text-white px-3 py-1 rounded mb-2">
          ❤️ ${n.likes}
        </button>
        <div>
          <input id="c-${n._id}" placeholder="Comentario" class="w-full mb-1 text-black">
          <button onclick="coment('${n._id}')" class="bg-yellow-500 w-full py-1 rounded">
            Enviar
          </button>
        </div>
      </div>
    `).join("");

    document.querySelectorAll('.card').forEach(card => setTimeout(()=>card.classList.add('show'),50));

  } catch(err){
    console.error("Error:",err);
    document.getElementById("contenedor").innerHTML = "Error conectando con el servidor";
  }
}

async function like(id){ await fetch(`${API}/noticias/${id}/like`, {method:"POST"}); cargar(); }
async function coment(id){
  const texto = document.getElementById("c-"+id).value;
  if(!texto) return alert("Escribí algo");
  await fetch(`${API}/noticias/${id}/comentario`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({texto})
  });
  cargar();
}

// FILTROS
document.querySelectorAll('.category-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.category-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    cargar(btn.dataset.cat);
  });
});

// Cargar al iniciar
cargar();
</script>

</body>
</html>
