<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apophis Noticias</title>

<!-- 💰 ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-TU_ID"
crossorigin="anonymous"></script>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0;font-family:Georgia;background:#f4e3b2;color:#111;transition:.3s;}
body.dark{background:#111;color:#f0e68c;}

.header{
  background:black;color:gold;padding:25px;
  display:flex;justify-content:center;align-items:center;
  position:relative;
}

.title{font-size:2rem;cursor:pointer;}

.admin-btn{
  position:absolute;right:15px;
  background:gold;color:black;padding:6px;border-radius:8px;
}

.container{
  max-width:900px;margin:auto;padding:15px;
}

.destacada{
  background:black;color:white;padding:20px;
  border-radius:12px;margin-bottom:15px;font-size:1.5rem;
}

.card{
  background:#fff8dc;padding:15px;border-radius:12px;margin-bottom:10px;
}
body.dark .card{background:#222;color:#f0e68c;}

.toggle-dark{
  position:fixed;bottom:10px;right:10px;
  padding:10px;border-radius:50%;background:gold;
}
</style>
</head>

<body>

<div class="header">
  <span class="title">APOPHIS NOTICIAS</span>
  <button class="admin-btn" onclick="loginAdmin()">Admin</button>
</div>

<div class="container">

<h3 id="visitas"></h3>

<div id="top3"></div>

<!-- 💰 ANUNCIO -->
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-TU_ID"
data-ad-slot="123456"
data-ad-format="auto"></ins>

<h2>Últimas Noticias</h2>
<div id="contenedor"></div>

</div>

<button class="toggle-dark" onclick="toggleDark()">🌙</button>

<script>
const API="https://apophis-noticias-backend.vercel.app";

function toggleDark(){
  document.body.classList.toggle("dark");
}

// ADMIN
function loginAdmin(){
  const user=prompt("Usuario");
  const pass=prompt("Contraseña");
  if((user==="Apophis"&&pass==="1234")||(user==="Benja357"&&pass==="abcd")){
    location="admin.html";
  } else alert("Error");
}

// VISITAS
async function visitas(){
  const r=await fetch(API+"/visitas");
  const d=await r.json();
  document.getElementById("visitas").innerText="👁 "+d.visitas;
}

// CARGAR
async function cargar(){
  const r=await fetch(API+"/noticias");
  const d=await r.json();

  top3.innerHTML=d.slice(0,3).map(n=>`
    <div class="destacada" onclick="ir('${n._id}')">${n.titulo}</div>
  `).join("");

  contenedor.innerHTML=d.slice(3).map(n=>`
    <div class="card" onclick="ir('${n._id}')">
      <h2>${n.titulo}</h2>
      <p>👁 ${n.vistas}</p>
    </div>
  `).join("");

  (adsbygoogle = window.adsbygoogle || []).push({});
}

function ir(id){location="noticia.html?id="+id;}

window.onload=()=>{
  visitas();
  cargar();
};
</script>

</body>
</html>
