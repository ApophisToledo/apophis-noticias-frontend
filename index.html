<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>𓂀 Apophis Noticias</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#f4e3b2;font-family:serif;}
.card{background:#fff7d1;padding:10px;border-radius:10px;margin:10px;}
.panel{position:fixed;top:0;right:0;width:350px;height:100%;background:white;padding:10px;display:none;}
</style>
</head>

<body>

<h1 class="text-4xl text-center p-4">𓂀 Apophis Noticias</h1>

<div id="noticias"></div>

<!-- PANEL ADMIN -->
<div id="panel" class="panel">
  <h2>ADMIN</h2>
  <input id="titulo" placeholder="Titulo" class="border w-full mb-2">
  <textarea id="contenido" class="border w-full mb-2"></textarea>
  <select id="categoria" class="border w-full mb-2">
    <option>politica</option>
    <option>deportes</option>
    <option>policiales</option>
  </select>
  <input type="file" id="img">
  <button onclick="crear()" class="bg-green-500 w-full">Publicar</button>
</div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
const ADMIN_KEY="apophis_secreto_123";

const params=new URLSearchParams(location.search);
const isAdmin=params.get("admin")===ADMIN_KEY;

if(isAdmin){
  document.getElementById("panel").style.display="block";
}

async function cargar(){
  const res=await fetch(API+"/noticias");
  const data=await res.json();

  noticias.innerHTML=data.map(n=>`
    <div class="card" onclick="ver('${n._id}')">
      <h2>${n.titulo}</h2>
      ${n.imagen?`<img src="${n.imagen}">`:''}
      <p>${n.contenido.substring(0,100)}</p>
    </div>
  `).join("");
}

function ver(id){
  location="noticia.html?id="+id;
}

async function crear(){
  const fd=new FormData();
  const file=img.files[0];

  let url="";
  if(file){
    fd.append("file",file);
    const r=await fetch(API+"/upload",{
      method:"POST",
      headers:{"x-admin-key":ADMIN_KEY},
      body:fd
    });
    const d=await r.json();
    url=d.url;
  }

  await fetch(API+"/noticias",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-admin-key":ADMIN_KEY
    },
    body:JSON.stringify({
      titulo:titulo.value,
      contenido:contenido.value,
      categoria:categoria.value,
      imagen:url
    })
  });

  alert("Publicada");
  cargar();
}

cargar();
</script>

</body>
</html>
