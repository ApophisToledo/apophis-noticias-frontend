<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Apophis Noticias</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#f4e3b2;font-family:Georgia;margin:0;}
.header{background:black;color:gold;padding:20px;text-align:center;font-size:2rem;animation:glow 2s infinite alternate;}
@keyframes glow{from{text-shadow:0 0 5px gold;}to{text-shadow:0 0 20px orange;}}
.ticker{background:red;color:white;overflow:hidden;white-space:nowrap;}
.ticker span{display:inline-block;padding-left:100%;animation:ticker 15s linear infinite;}
@keyframes ticker{0%{transform:translateX(0);}100%{transform:translateX(-100%);}}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;padding:15px;}
.card{background:#fff8dc;padding:10px;border-left:5px solid gold;border-radius:10px;}
</style>
</head>

<body>

<div class="header">𓂀 𓆣 𓁹 APOPHIS NOTICIAS 𓁹 𓆣 𓂀</div>

<div class="ticker"><span id="tickerText"></span></div>

<h2>🔥 Ranking</h2>
<div id="ranking"></div>

<div id="contenedor" class="grid"></div>

<script>
const API="https://apophis-noticias-backend.vercel.app";

async function cargar(){
  const res=await fetch(API+"/noticias");
  const data=await res.json();

  contenedor.innerHTML=data.map(n=>`
    <div class="card" onclick="ir('${n._id}')">
      <h2>${n.titulo}</h2>
      <p>${n.contenido.substring(0,100)}</p>
    </div>
  `).join("");

  tickerText.innerText=data.slice(0,5).map(n=>n.titulo).join(" 🔴 ");
}

async function rankingLoad(){
  const res=await fetch(API+"/ranking");
  const data=await res.json();

  ranking.innerHTML=data.map(n=>`
    <div onclick="ir('${n._id}')">
      🔥 ${n.titulo} (${n.vistas} vistas)
    </div>
  `).join("");
}

function ir(id){ location="noticia.html?id="+id; }

cargar();
rankingLoad();
</script>

</body>
</html>
