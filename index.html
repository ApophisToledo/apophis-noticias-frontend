<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apophis Noticias</title>

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6641245592697930"
crossorigin="anonymous"></script>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0;font-family:Georgia;background:#f4e3b2;color:#111;transition:.3s;}
body.dark{background:#111;color:#f0e68c;}

.header{
  background:black;color:gold;
  padding:25px;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.header span.title{font-size:2rem;cursor:pointer;}

.admin-btn{
  position:absolute;
  right:15px;
  background:gold;
  color:black;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:15px;
  text-align:center;
}

/* CATEGORIAS */
.cat-btn{
  margin:5px;
  padding:8px 12px;
  border-radius:8px;
  border:none;
  background:#111;
  color:gold;
  cursor:pointer;
}
.cat-btn:hover{background:gold;color:black;}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

/* 🔥 CARD TIPO ROSARIO3 */
.card{
  position:relative;
  height:220px;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  display:flex;
  align-items:flex-end;
  color:white;
  font-weight:bold;
}

/* IMAGEN FONDO */
.card-bg{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  transition:.4s;
}

/* OSCURECIDO */
.card-overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

/* TITULO */
.card h2{
  position:relative;
  padding:10px;
  font-size:1.2rem;
  text-align:left;
  z-index:2;
}

/* HOVER */
.card:hover .card-bg{
  transform:scale(1.1);
}

/* DARK MODE */
body.dark .card-overlay{
  background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* ULTIMAS */
#ultimasNoticias{
  background:red;
  color:white;
  padding:10px;
  overflow:hidden;
  white-space:nowrap;
  font-weight:bold;
}

#ultimasNoticias span{
  margin-right:40px;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:480px){
  .card{height:180px;}
  .card h2{font-size:1rem;}
}
</style>
</head>

<body>

<div class="header">
  <span class="title" onclick="location='index.html'">APOPHIS NOTICIAS</span>
  <button class="admin-btn" onclick="loginAdmin()">Admin</button>
</div>

<div id="ultimasNoticias"></div>

<div class="container">

<h3 id="visitas"></h3>

<!-- CATEGORIAS -->
<div>
  <button class="cat-btn" onclick="verCat('politica')">Política</button>
  <button class="cat-btn" onclick="verCat('deportes')">Deportes</button>
  <button class="cat-btn" onclick="verCat('policiales')">Policiales</button>
  <button class="cat-btn" onclick="verCat('arte')">Arte</button>
  <button class="cat-btn" onclick="verCat('show')">Show</button>
  <button class="cat-btn" onclick="verCat('pais')">País</button>
  <button class="cat-btn" onclick="verCat('mundo')">Mundo</button>
  <button class="cat-btn" onclick="verCat('ciudad')">Ciudad</button>
</div>

<!-- ADS -->
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-6641245592697930"
data-ad-slot="123456"
data-ad-format="auto"></ins>

<h2>Últimas Noticias</h2>

<div id="contenedor" class="grid"></div>

</div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
const contenedor=document.getElementById("contenedor");
const ultimasNoticias=document.getElementById("ultimasNoticias");

// ADMIN
function loginAdmin(){
  const user=prompt("Usuario Admin:");
  const pass=prompt("Contraseña:");
  if((user==="Apophis"&&pass==="1234")||(user==="Benja357"&&pass==="abcd")){
    location="admin.html";
  }
}

// VISITAS
async function visitas(){
  const r=await fetch(API+"/visitas");
  const d=await r.json();
  document.getElementById("visitas").innerText="👁 "+d.visitas;
}

// CARGAR
async function cargar(){
  const res=await fetch(API+"/noticias");
  const data=await res.json();

  // SCROLL ROJO
  ultimasNoticias.innerHTML = data.map(n=>`
    <span onclick="ir('${n._id}')">${n.titulo}</span>
  `).join("");

  // CARDS TIPO ROSARIO3
  contenedor.innerHTML = data.map(n=>`
    <div class="card" onclick="ir('${n._id}')">
      
      <div class="card-bg" style="background-image:url('${n.imagen || ""}')"></div>
      <div class="card-overlay"></div>

      <h2>${n.titulo}</h2>

    </div>
  `).join("");

  (adsbygoogle = window.adsbygoogle || []).push({});
}

function ir(id){
  location="noticia.html?id="+id;
}

function verCat(cat){
  location="categoria.html?cat="+cat;
}

window.onload=()=>{
  visitas();
  cargar();
};
</script>

</body>
</html>
