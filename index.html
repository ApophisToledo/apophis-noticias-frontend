<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apophis Noticias</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(#fdf6e3,#f4e3b2);
  font-family: "Papyrus", fantasy;
  color: #000;
}
header {
  background-color: #d4af37;
  padding: 2rem;
  text-align: center;
}
.card {
  background:#fff7d1;
  border:2px solid #d4af37;
  border-radius: 12px;
  padding: 1rem;
}
</style>
</head>

<body>

<header>
<h1>𓂀 Apophis Noticias 𓂀</h1>
<p>Noticias de Rosario estilo egipcio</p>
</header>

<main id="contenedor" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 p-6"></main>

<script>

const API = "https://apophis-noticias-backend-git-main-apophistoledos-projects.vercel.app";

async function cargar(){
  const res = await fetch(API + "/noticias");
  const data = await res.json();

  const contenedor = document.getElementById("contenedor");

  if(data.length === 0){
    contenedor.innerHTML = "<p>No hay noticias aún</p>";
    return;
  }

  contenedor.innerHTML = data.map(n => `
    <div class="card">
      <h2>${n.titulo}</h2>
      <p>${n.contenido}</p>

      <button onclick="like('${n._id}')">❤️ ${n.likes}</button>

      <input id="c-${n._id}" placeholder="Comentario">
      <button onclick="coment('${n._id}')">Enviar</button>
    </div>
  `).join("");
}

async function like(id){
  await fetch(`${API}/noticias/${id}/like`, {method:"POST"});
  cargar();
}

async function coment(id){
  const texto = document.getElementById("c-"+id).value;

  await fetch(`${API}/noticias/${id}/comentario`, {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({texto})
  });

  cargar();
}

cargar();

</script>

</body>
</html>
