<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>𓂀 Apophis Noticias</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#f4e3b2;font-family:serif;margin:0;}
.card{background:#fff7d1;padding:10px;border-radius:10px;margin:10px; transition: transform 0.3s;}
.card:hover{transform: scale(1.02);}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;z-index:99999;}
.modal-content{background:white;padding:20px;border-radius:10px;position:relative;}
.close-btn{position:absolute;top:5px;right:10px;font-size:18px;cursor:pointer;}
.panel{position:fixed;top:0;right:0;width:400px;height:100%;background:white;overflow:auto;padding:15px;display:none;z-index:9999;}
.animate-red{animation: blink 1s infinite;}
@keyframes blink{0%,100%{background:red;}50%{background:#ff4c4c;}}
</style>
</head>
<body>

<h1 class="text-5xl text-center p-4 animate-pulse">
  <span>👁️</span> 𓂀 Apophis Noticias 𓂀 <span>👁️</span>
</h1>

<div class="text-center mb-4">
  <button onclick="abrirLogin()" class="bg-black text-white px-4 py-2 mr-2">Ingresar Admin</button>
  <button onclick="abrirRegistro()" class="bg-blue-800 text-white px-4 py-2">Registro</button>
</div>

<div class="text-center mb-4">
  <input id="searchInput" placeholder="Buscar noticias..." class="border p-1 w-64">
  <button onclick="buscar()" class="bg-yellow-600 px-2 text-white">Buscar</button>
</div>

<div id="categorias" class="flex justify-center gap-3 mb-4">
  <button onclick="filtrar('politica')" class="px-3 py-1 bg-yellow-500 rounded">Política</button>
  <button onclick="filtrar('deportes')" class="px-3 py-1 bg-green-500 rounded">Deportes</button>
  <button onclick="filtrar('policiales')" class="px-3 py-1 bg-red-500 rounded">Policiales</button>
  <button onclick="filtrar('arte')" class="px-3 py-1 bg-purple-500 rounded">Arte</button>
  <button onclick="filtrar('show')" class="px-3 py-1 bg-pink-500 rounded">Show</button>
</div>

<div id="ultimoMomento" class="p-2 mb-4 text-white font-bold text-lg animate-red flex items-center gap-2"></div>

<div id="noticias" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

<div class="text-center mb-4">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-TU_CLIENTE_ADSENSE"
       data-ad-slot="TU_SLOT"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
</div>

<div id="login" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="cerrarLogin()">&times;</span>
    <h2 class="text-xl mb-2">Ingresar Admin</h2>
    <input id="user" placeholder="Usuario" class="border w-full mb-2 p-1">
    <input id="pass" type="password" placeholder="Contraseña" class="border w-full mb-2 p-1">
    <button onclick="login()" class="bg-black text-white w-full">Entrar</button>
  </div>
</div>

<div id="registro" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="cerrarRegistro()">&times;</span>
    <h2 class="text-xl mb-2">Registrar Usuario</h2>
    <input id="regUser" placeholder="Usuario" class="border w-full mb-2 p-1">
    <input id="regPass" type="password" placeholder="Contraseña" class="border w-full mb-2 p-1">
    <button onclick="registrar()" class="bg-blue-800 text-white w-full">Registrar</button>
  </div>
</div>

<div id="dashboard" class="panel">
  <h2 class="text-xl mb-2">Panel Admin</h2>
  <input id="titulo" placeholder="Titulo" class="border w-full mb-2 p-1">
  <textarea id="contenido" class="border w-full mb-2 p-1"></textarea>
  <select id="categoria" class="border w-full mb-2 p-1">
    <option value="politica">Política</option>
    <option value="deportes">Deportes</option>
    <option value="policiales">Policiales</option>
    <option value="arte">Arte</option>
    <option value="show">Show</option>
  </select>
  <input type="file" id="img" class="mb-2">
  <input type="file" id="video" class="mb-2">
  <button onclick="crear()" class="bg-green-600 text-white w-full mb-3">Crear Noticia</button>
  <h3>Noticias</h3>
  <div id="listaAdmin"></div>
  <button onclick="cerrarAdmin()" class="bg-red-600 text-white w-full mt-3">Cerrar Panel</button>
</div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
let token="";
let admin=false;

// MODALES
function abrirLogin(){ document.getElementById("login").style.display="flex"; }
function cerrarLogin(){ document.getElementById("login").style.display="none"; }
function abrirRegistro(){ document.getElementById("registro").style.display="flex"; }
function cerrarRegistro(){ document.getElementById("registro").style.display="none"; }
function cerrarAdmin(){ document.getElementById("dashboard").style.display="none"; }

// LOGIN ADMIN
async function login(){
  const u = document.getElementById("user").value.trim();
  const p = document.getElementById("pass").value.trim();
  if(!u||!p){ alert("Complete usuario y contraseña"); return; }

  try{
    const res = await fetch(API+"/login",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({user:u, pass:p})
    });
    if(!res.ok){ const err = await res.json(); alert(err.error||"Usuario o contraseña incorrecta"); return; }
    const data = await res.json();
    token = data.token;
    admin = (data.role==="admin");
    localStorage.setItem("token", token);
    cerrarLogin();
    if(admin) document.getElementById("dashboard").style.display="block";
    cargar();
  }catch(e){ alert("Error de conexión"); console.error(e);}
}

// REGISTRO
async function registrar(){
  const u = document.getElementById("regUser").value.trim();
  const p = document.getElementById("regPass").value.trim();
  if(!u||!p){ alert("Complete usuario y contraseña"); return; }

  try{
    const res = await fetch(API+"/register",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({user:u, pass:p})
    });
    if(!res.ok){ const err = await res.json(); alert(err.error||"Error al registrar"); return; }
    alert("Usuario registrado, ahora puede ingresar"); cerrarRegistro();
  }catch(e){ alert("Error de conexión"); console.error(e);}
}

// CARGAR NOTICIAS
async function cargar(){
  const res = await fetch(API+"/noticias");
  const data = await res.json();

  // Último momento
  if(data.length>0){
    const ultimo = data[0];
    document.getElementById("ultimoMomento").innerHTML = `<img src="${ultimo.imagen||''}" class="w-10 h-10 rounded mr-2"> Último Momento: ${ultimo.titulo}`;
  }

  document.getElementById("noticias").innerHTML = data.map(n=>`
    <div class="card cursor-pointer" onclick="ir('${n._id}')">
      <h2 class="font-bold text-lg">${n.titulo}</h2>
      ${n.imagen?`<img src="${n.imagen}" class="w-full h-40 object-cover rounded mt-2 mb-2">`:''}
      ${n.video?`<video src="${n.video}" controls class="w-full rounded mb-2"></video>`:''}
      <p>${n.contenido.substring(0,80)}...</p>
      <p>👍 ${n.likes.length} | 👎 ${n.dislikes.length} | 👁️ ${n.vistas}</p>
    </div>
  `).join("");

  if(admin){
    document.getElementById("listaAdmin").innerHTML = data.map(n=>`
      <div class="border p-2 mb-2">
        <b>${n.titulo}</b><br>
        <button onclick="eliminar('${n._id}')" class="bg-red-500 text-white px-2">Eliminar</button>
        <button onclick="editar('${n._id}')" class="bg-yellow-500 text-white px-2">Editar</button>
      </div>
    `).join("");
  }
}

async function crear(){
  const fd = new FormData();
  const img = document.getElementById("img").files[0];
  const video = document.getElementById("video").files[0];
  if(img) fd.append("file", img);
  if(video) fd.append("video", video);

  let url=""; let vurl="";
  if(img){
    const r = await fetch(API+"/upload",{method:"POST",headers:{Authorization:token},body:fd});
    const d = await r.json(); url=d.url; vurl=d.video||'';
  }

  await fetch(API+"/noticias",{method:"POST",
    headers:{"Content-Type":"application/json", Authorization:token},
    body:JSON.stringify({
      titulo:titulo.value,
      contenido:contenido.value,
      categoria:categoria.value,
      imagen:url,
      video:vurl
    })
  });
  alert("Noticia creada"); cargar();
}

async function eliminar(id){
  if(!confirm("Eliminar noticia?")) return;
  await fetch(API+"/noticias/"+id,{method:"DELETE",headers:{Authorization:token}});
  cargar();
}

async function editar(id){
  const res = await fetch(API+"/noticias/"+id); const n = await res.json();
  titulo.value = n.titulo; contenido.value = n.contenido; categoria.value = n.categoria;
}

async function filtrar(cat){
  const res = await fetch(API+"/noticias/categoria/"+cat); const data = await res.json();
  document.getElementById("noticias").innerHTML = data.map(n=>`
    <div class="card cursor-pointer" onclick="ir('${n._id}')">
      <h2 class="font-bold text-lg">${n.titulo}</h2>
      ${n.imagen?`<img src="${n.imagen}" class="w-full h-40 object-cover rounded mt-2 mb-2">`:''}
      <p>${n.contenido.substring(0,80)}...</p>
    </div>
  `).join("");
}

async function buscar(){
  const q = document.getElementById("searchInput").value.trim();
  if(!q) return cargar();
  const res = await fetch(API+"/noticias/search?q="+encodeURIComponent(q));
  const data = await res.json();
  document.getElementById("noticias").innerHTML = data.map(n=>`
    <div class="card cursor-pointer" onclick="ir('${n._id}')">
      <h2 class="font-bold text-lg">${n.titulo}</h2>
      ${n.imagen?`<img src="${n.imagen}" class="w-full h-40 object-cover rounded mt-2 mb-2">`:''}
      <p>${n.contenido.substring(0,80)}...</p>
    </div>
  `).join("");
}

function ir(id){ location="noticia.html?id="+id; }

cargar();
</script>
</body>
</html>
