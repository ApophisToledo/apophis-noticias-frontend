<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>𓂀 Apophis Noticias</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#f4e3b2;font-family:serif;}
.card{background:#fff7d1;padding:10px;border-radius:10px;margin:10px;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;z-index:99999;}
.panel{position:fixed;top:0;right:0;width:300px;height:100%;background:white;overflow:auto;padding:15px;display:none;}
</style>
</head>

<body>

<h1 class="text-3xl text-center p-4">𓂀 Apophis Noticias</h1>

<div class="text-center">
  <button onclick="abrirLogin()" class="bg-black text-white px-4 py-2">Admin</button>
</div>

<div id="noticias"></div>

<!-- LOGIN -->
<div id="login" class="modal">
  <div class="bg-white p-4 rounded">
    <h2>Admin</h2>
    <input id="user" placeholder="Usuario" class="border w-full mb-2">
    <input id="pass" type="password" placeholder="Contraseña" class="border w-full mb-2">
    <button onclick="login()" class="bg-black text-white w-full">Entrar</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="panel">
  <h2 class="text-xl mb-2">Panel Admin</h2>

  <input id="titulo" placeholder="Titulo" class="border w-full mb-2">
  <textarea id="contenido" class="border w-full mb-2"></textarea>

  <select id="categoria" class="border w-full mb-2">
    <option value="politica">Política</option>
    <option value="deportes">Deportes</option>
    <option value="policiales">Policiales</option>
    <option value="arte">Arte</option>
    <option value="show">Show</option>
  </select>

  <input type="file" id="img" class="mb-2">

  <button onclick="crear()" class="bg-green-600 text-white w-full mb-3">Publicar</button>

  <h3>Noticias</h3>
  <div id="listaAdmin"></div>

  <button onclick="cerrarAdmin()" class="bg-red-600 text-white w-full mt-3">Cerrar</button>
</div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
let admin=false;

// LOGIN
function abrirLogin(){
  document.getElementById("login").style.display="flex";
}

async function login(){
  const res=await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user:user.value,pass:pass.value})
  });

  if(res.ok){
    admin=true;
    document.getElementById("login").style.display="none";
    document.getElementById("dashboard").style.display="block";
    cargar();
  }else{
    alert("Error login");
  }
}

// CERRAR
function cerrarAdmin(){
  document.getElementById("dashboard").style.display="none";
}

// CARGAR
async function cargar(){
  const res=await fetch(API+"/noticias");
  const data=await res.json();

  // PUBLICO
  document.getElementById("noticias").innerHTML=
  data.map(n=>`
    <div class="card">
      <h2 onclick="ir('${n._id}')">${n.titulo}</h2>
      <p>${n.contenido.substring(0,80)}...</p>
      <p>👍 ${n.likes} | 👁️ ${n.vistas}</p>
    </div>
  `).join("");

  // ADMIN LISTA
  if(admin){
    document.getElementById("listaAdmin").innerHTML=
    data.map(n=>`
      <div class="border p-2 mb-2">
        <b>${n.titulo}</b><br>
        <button onclick="eliminar('${n._id}')" class="bg-red-500 text-white px-2">Eliminar</button>
      </div>
    `).join("");
  }
}

// IR
function ir(id){
  location="noticia.html?id="+id;
}

// CREAR
async function crear(){
  let url="";
  const img=document.getElementById("img");

  if(img.files[0]){
    const fd=new FormData();
    fd.append("file",img.files[0]);

    const r=await fetch(API+"/upload",{method:"POST",body:fd});
    const d=await r.json();
    url=d.url;
  }

  await fetch(API+"/noticias",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      titulo:titulo.value,
      contenido:contenido.value,
      categoria:categoria.value,
      imagen:url
    })
  });

  alert("Publicada");
  cargar();
}

// DELETE
async function eliminar(id){
  await fetch(API+"/noticias/"+id,{
    method:"DELETE",
    headers:{user:"admin",pass:"1234"}
  });
  cargar();
}

cargar();
</script>

</body>
</html>
