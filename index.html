<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apophis Noticias</title>

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6641245592697930"
crossorigin="anonymous"></script>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0;font-family:Georgia;background:#f4e3b2;color:#111;}
body.dark{background:#111;color:#f0e68c;}

.header{
  background:black;color:gold;
  padding:25px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  position:relative;
}

.title{font-size:2rem;cursor:pointer;}

.admin-btn{
  position:absolute;
  right:15px;
  background:gold;
  padding:6px;
  border-radius:8px;
}

/* OJOS */
.eyes{
  font-size:1.5rem;
  animation:blink 4s infinite;
}
@keyframes blink{
  0%,90%,100%{transform:scaleY(1);}
  95%{transform:scaleY(0.1);}
}

/* FLEYER */
#ultimasNoticias{
  background:red;
  color:white;
  padding:10px;
  overflow:hidden;
  white-space:nowrap;
}
#ultimasNoticias span{
  display:inline-block;
  margin-right:40px;
  animation:scroll 20s linear infinite;
}
@keyframes scroll{
  0%{transform:translateX(100%);}
  100%{transform:translateX(-100%);}
}

.container{
  max-width:1100px;
  margin:auto;
  padding:15px;
  text-align:center;
}

/* CATEGORIAS */
.cat-btn{
  margin:5px;
  padding:8px;
  background:#111;
  color:gold;
  border-radius:8px;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  position:relative;
  height:220px;
  border-radius:12px;
  overflow:hidden;
  display:flex;
  align-items:flex-end;
  color:white;
}

.card-bg{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
}

.card-overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
}

.card h2{
  position:relative;
  padding:10px;
  font-size:1.2rem;
}
</style>
</head>

<body>

<div class="header">
<span class="eyes">𓂀</span>
<span class="title" onclick="location='index.html'">APOPHIS NOTICIAS</span>
<span class="eyes">𓂀</span>
<button class="admin-btn" onclick="loginAdmin()">Admin</button>
</div>

<div id="ultimasNoticias"></div>

<div class="container">

<h3 id="visitas"></h3>

<div>
<button class="cat-btn" onclick="verCat('politica')">Política</button>
<button class="cat-btn" onclick="verCat('deportes')">Deportes</button>
<button class="cat-btn" onclick="verCat('policiales')">Policiales</button>
<button class="cat-btn" onclick="verCat('arte')">Arte</button>
<button class="cat-btn" onclick="verCat('show')">Show</button>
<button class="cat-btn" onclick="verCat('pais')">País</button>
<button class="cat-btn" onclick="verCat('mundo')">Mundo</button>
<button class="cat-btn" onclick="verCat('ciudad')">Ciudad</button>
</div>

<div id="contenedor" class="grid"></div>

</div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
const contenedor=document.getElementById("contenedor");

function loginAdmin(){
  location="admin.html";
}

async function visitas(){
  const r=await fetch(API+"/visitas");
  const d=await r.json();
  visitas.innerText="👁 "+d.visitas;
}

async function cargar(){
  const res=await fetch(API+"/noticias");
  const data=await res.json();

  ultimasNoticias.innerHTML = data.map(n=>`<span>${n.titulo}</span>`).join("");

  contenedor.innerHTML = data.map(n=>`
  <div class="card" onclick="ir('${n._id}')">
    <div class="card-bg" style="background-image:url('${n.imagen||""}')"></div>
    <div class="card-overlay"></div>
    <h2>${n.titulo}</h2>
  </div>
  `).join("");
}

function ir(id){location="noticia.html?id="+id;}
function verCat(c){location="categoria.html?cat="+c;}

window.onload=()=>{visitas();cargar();}
</script>

</body>
</html>
