<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𓂀 Apophis Noticias 𓂀</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- SEO / Google -->
<meta name="description" content="Noticias de Rosario, provincia, país y mundo con estilo egipcio. Deportes, política, arte y más.">
<meta name="keywords" content="Noticias, Rosario, Argentina, Deportes, Política, Arte, Show, Policiales">
<script async src="https://www.googletagmanager.com/gtag/js?id=UA-XXXXX-Y"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config','UA-XXXXX-Y');
</script>

<style>
body { background: linear-gradient(#fdf6e3,#f4e3b2); font-family:"Papyrus", fantasy; }
header { background:#d4af37; box-shadow:0 4px 8px rgba(0,0,0,0.3); }
.card { background:#fff7d1; border:2px solid #d4af37; border-radius:12px; padding:1rem; transition: all 0.3s; }
.card:hover { transform: scale(1.03); box-shadow:0 6px 16px rgba(212,175,55,0.5); }
button { cursor:pointer; transition: all 0.2s; }
button:hover { transform: scale(1.05); }
input { border:1px solid #d4af37; border-radius:6px; padding:0.3rem; }
</style>
</head>
<body>

<header class="p-5 text-center">
<h1 class="text-4xl font-bold">𓂀 Apophis Noticias 𓂀</h1>
<p class="mt-1 text-lg">Noticias de Rosario, provincia, país y mundo</p>
</header>

<!-- LOGIN MODAL -->
<div id="loginModal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50">
  <div class="bg-yellow-100 p-6 rounded shadow-lg w-80 text-center">
    <h2 class="text-2xl font-bold mb-4">Login Admin</h2>
    <input id="user" placeholder="Usuario" class="border px-2 py-1 w-full mb-2">
    <input id="pass" type="password" placeholder="Contraseña" class="border px-2 py-1 w-full mb-4">
    <button onclick="login()" class="bg-yellow-700 text-white px-4 py-2 rounded">Ingresar</button>
    <p id="loginError" class="text-red-600 mt-2"></p>
  </div>
</div>

<main id="contenedor" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 p-6">
<p>Cargando noticias...</p>
</main>

<script>
const API = "https://apophis-noticias-backend.vercel.app";
let isAdmin = false;

async function login(){
  const user=document.getElementById("user").value;
  const pass=document.getElementById("pass").value;
  try{
    const res = await fetch(`${API}/login`, {
      method:"POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({user, pass})
    });
    const data = await res.json();
    if(data.ok){
      isAdmin=true;
      document.getElementById("loginModal").style.display="none";
      cargar();
    } else document.getElementById("loginError").innerText="Usuario o contraseña incorrectos";
  }catch(err){ console.error(err); document.getElementById("loginError").innerText="Error de conexión"; }
}

async function cargar(){
  try{
    const res = await fetch(API+"/noticias");
    const data = await res.json();
    const contenedor=document.getElementById("contenedor");
    if(!data.length){ contenedor.innerHTML="<p>No hay noticias todavía</p>"; return; }
    contenedor.innerHTML=data.map(n=>`
      <div class="card">
        <h2 class="text-xl font-bold mb-2">${n.titulo}</h2>
        ${n.imagen ? `<img src="${n.imagen}" class="mb-2 w-full rounded">` : ""}
        <p class="mb-3">${n.contenido}</p>
        <button onclick="like('${n._id}')" class="bg-yellow-700 text-white px-3 py-1 rounded mb-2">❤️ ${n.likes}</button>
        <button onclick="dislike('${n._id}')" class="bg-gray-700 text-white px-3 py-1 rounded mb-2">👎 ${n.dislikes||0}</button>
        <div>
          <input id="c-${n._id}" placeholder="Comentario" class="w-full mb-1 text-black">
          <button onclick="coment('${n._id}')" class="bg-yellow-500 w-full py-1 rounded">Enviar</button>
        </div>
        ${isAdmin ? `<button onclick="eliminar('${n._id}')" class="bg-red-600 text-white w-full py-1 mt-2 rounded">Eliminar</button>` : ""}
      </div>
    `).join("");
  }catch(err){ console.error(err); document.getElementById("contenedor").innerHTML="Error conectando con el servidor"; }
}

async function like(id){ await fetch(`${API}/noticias/${id}/like`,{method:"POST"}); cargar(); }
async function dislike(id){ await fetch(`${API}/noticias/${id}/dislike`,{method:"POST"}); cargar(); }
async function coment(id){
  const texto=document.getElementById("c-"+id).value;
  if(!texto) return alert("Escribí algo");
  await fetch(`${API}/noticias/${id}/comentario`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({texto})
  });
  cargar();
}
async function eliminar(id){
  if(!confirm("¿Seguro que querés eliminar esta noticia?")) return;
  await fetch(`${API}/noticias/${id}`,{method:"DELETE"});
  cargar();
}

cargar();
</script>

</body>
</html>
