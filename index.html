<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>𓂀 Apophis Noticias 𓂀</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{margin:0;padding:0;font-family:Georgia;background:#f4e3b2;}
.header{background:#111;color:white;text-align:center;padding:25px;font-size:2.5rem;position:sticky;top:0;z-index:10;}
.header span{display:inline-block;margin:0 15px;animation:ojos 1.5s infinite alternate;}
@keyframes ojos{from{transform:scale(1);} to{transform:scale(1.3);}}
.categories{display:flex;justify-content:center;gap:10px;padding:10px;background:#222;}
.categories button{color:white;padding:5px 10px;border-radius:5px;cursor:pointer;}
.categories button:hover{background:gold;color:black;}
.nav{display:flex;justify-content:center;gap:10px;padding:10px;background:#333;}
.nav button{padding:6px 12px;border-radius:5px;cursor:pointer;color:white;font-weight:bold;}
.nav button:hover{background:gold;color:black;}
.grid{max-width:1200px;margin:auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;padding:15px;}
.card{background:#fff8dc;border-left:5px solid gold;padding:15px;border-radius:10px;cursor:pointer;transition:.3s;opacity:0;transform:translateY(20px);animation:fadeInUp 0.5s forwards;}
.card img{max-width:100%;border-radius:10px;margin-top:5px;}
@keyframes fadeInUp{to{opacity:1;transform:translateY(0);}}
.ultimo{background:red;color:white;text-align:center;font-weight:bold;padding:10px;animation:blinkBg 1s infinite alternate;display:flex;justify-content:center;align-items:center;gap:10px;}
.ultimo img{max-width:50px;border-radius:5px;border:2px solid white;}
@keyframes blinkBg{from{opacity:1;} to{opacity:.6;}}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;z-index:9999;}
.modal .box{background:white;padding:20px;border-radius:10px;width:300px;}
.panel{position:fixed;right:0;top:0;width:350px;height:100%;background:white;padding:15px;overflow:auto;display:none;box-shadow:-3px 0 10px rgba(0,0,0,0.3);}
.notif{position:fixed;bottom:20px;right:20px;background:black;color:white;padding:10px;border-radius:5px;display:none;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header"><span>𓂀</span> Apophis Noticias <span>𓂀</span></div>

<!-- ULTIMO MOMENTO -->
<div id="ultimoMomento" class="ultimo">
  <img id="imgUltimo" src="" alt="">
  <span id="textoUltimo">Último momento...</span>
</div>

<!-- CATEGORIAS -->
<div class="categories">
  <button onclick="verCategoria('politica')">Política</button>
  <button onclick="verCategoria('deportes')">Deportes</button>
  <button onclick="verCategoria('policiales')">Policiales</button>
  <button onclick="verCategoria('arte')">Arte</button>
  <button onclick="verCategoria('show')">Show</button>
</div>

<!-- NAV -->
<div class="nav" id="navPanel">
  <button onclick="abrirLogin()">Ingresar</button>
  <button onclick="abrirRegister()">Registro</button>
  <button id="btnAdmin" onclick="abrirAdmin()" style="display:none;">✍️ Admin</button>
</div>

<!-- GRID NOTICIAS -->
<div id="noticias" class="grid"></div>

<!-- MODALES LOGIN / REGISTER -->
<div id="login" class="modal">
  <div class="box">
    <h2>Login</h2>
    <input id="user" placeholder="Usuario" class="border w-full mb-2 p-1">
    <input id="pass" type="password" placeholder="Contraseña" class="border w-full mb-2 p-1">
    <button onclick="login()" class="bg-black text-white w-full">Entrar</button>
  </div>
</div>

<div id="register" class="modal">
  <div class="box">
    <h2>Registro</h2>
    <input id="userR" placeholder="Usuario" class="border w-full mb-2 p-1">
    <input id="passR" type="password" placeholder="Contraseña" class="border w-full mb-2 p-1">
    <button onclick="register()" class="bg-yellow-600 text-white w-full">Crear cuenta</button>
  </div>
</div>

<!-- PANEL ADMIN -->
<div id="adminPanel" class="panel">
<h2 class="text-xl mb-2">Panel Admin Profesional</h2>
<input id="titulo" placeholder="Título" class="border w-full mb-2 p-1">
<textarea id="contenido" class="border w-full mb-2 p-1"></textarea>
<select id="categoria" class="border w-full mb-2 p-1">
  <option value="politica">Política</option>
  <option value="deportes">Deportes</option>
  <option value="policiales">Policiales</option>
  <option value="arte">Arte</option>
  <option value="show">Show</option>
</select>
<input type="file" id="img" class="mb-2">
<button onclick="crear()" class="bg-green-600 text-white w-full mb-3">Publicar</button>
<h3>Noticias Propias</h3>
<div id="listaAdmin"></div>
<button onclick="cerrarAdmin()" class="bg-red-600 text-white w-full mt-3">Cerrar</button>
</div>

<!-- NOTIFICACIONES -->
<div id="notif" class="notif"></div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
let token=localStorage.getItem("token");
let user=localStorage.getItem("user");

// Mostrar usuario en nav
function mostrarUsuario(){
  const navPanel=document.getElementById("navPanel");
  if(user){
    navPanel.innerHTML=`👤 ${user} <button onclick="logout()">Salir</button>`;
    if(user==="admin"){document.getElementById("btnAdmin").style.display="inline-block";}
  }
}

// Notificaciones
function noti(msg){const n=document.getElementById("notif");n.innerText=msg;n.style.display="block";setTimeout(()=>n.style.display="none",2000);}

// LOGIN / REGISTER
function abrirLogin(){document.getElementById("login").style.display="flex";}
function abrirRegister(){document.getElementById("register").style.display="flex";}
function logout(){localStorage.clear(); location.reload();}

async function register(){
  const res=await fetch(API+"/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user:userR.value,pass:passR.value})});
  if(res.ok){noti("Usuario creado"); document.getElementById("register").style.display="none";}
}

async function login(){
  const res=await fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user:user.value,pass:pass.value})});
  if(!res.ok){alert("Error login"); return;}
  const d=await res.json();
  localStorage.setItem("token",d.token); localStorage.setItem("user",d.user); token=d.token; user=d.user;
  document.getElementById("login").style.display="none"; mostrarUsuario(); cargarAdmin();
}

// PANEL ADMIN
function abrirAdmin(){document.getElementById("adminPanel").style.display="block";}
function cerrarAdmin(){document.getElementById("adminPanel").style.display="none";}

// Crear / Editar / Eliminar noticias
async function crear(){
  let url="";
  if(img.files[0]){
    const fd=new FormData();
    fd.append("file",img.files[0]);
    const r=await fetch(API+"/upload",{method:"POST",body:fd,headers:{Authorization:token}});
    const d=await r.json();
    url=d.url;
  }
  await fetch(API+"/noticias",{method:"POST",headers:{"Content-Type":"application/json","Authorization":token},body:JSON.stringify({titulo:titulo.value,contenido:contenido.value,categoria:categoria.value,imagen:url,autor:user})});
  noti("Publicada"); cargar(); cargarAdmin();
}

async function cargarAdmin(){
  const res=await fetch(API+"/noticias");
  const data=await res.json();
  listaAdmin.innerHTML=data.filter(n=>n.autor===user).map(n=>`<div>${n.titulo} 
    <button onclick="editar('${n._id}')" class="button">✏️</button>
    <button onclick="eliminar('${n._id}')" class="button">❌</button></div>`).join("");
}

async function editar(id){
  const res=await fetch(API+"/noticias/"+id);
  const n=await res.json();
  titulo.value=n.titulo; contenido.value=n.contenido; categoria.value=n.categoria;
  img.files=null;
  await fetch(API+"/noticias/"+id,{method:"DELETE",headers:{Authorization:token}});
  cargar(); cargarAdmin();
}

async function eliminar(id){
  await fetch(API+"/noticias/"+id,{method:"DELETE",headers:{Authorization:token}});
  cargar(); cargarAdmin();
}

// Cargar noticias y último momento
async function cargar(){
  const res=await fetch(API+"/noticias");
  const data=await res.json();
  const ult=data[0];
  if(ult){document.getElementById("textoUltimo").innerText="Último momento: "+ult.titulo; document.getElementById("imgUltimo").src=ult.imagen||"";}
  noticias.innerHTML=data.map((n,i)=>`<div class="card" style="animation-delay:${i*0.1}s" onclick="ir('${n._id}')">
    <h2>${n.titulo}</h2>
    ${n.imagen?`<img src="${n.imagen}">`:''}
    <p>${n.contenido.substring(0,100)}...</p>
    <p>👁️ ${n.vistas||0} 👍 ${n.likes?.length||0} 👎 ${n.dislikes?.length||0}</p>
  </div>`).join("");
}

// CATEGORIAS
function verCategoria(cat){location="categoria.html?cat="+cat;}
function ir(id){location="noticia.html?id="+id;}

// Inicio
mostrarUsuario();
cargarAdmin();
cargar();
setInterval(cargar,10000);

</script>

</body>
</html>
