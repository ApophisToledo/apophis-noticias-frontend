<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>𓂀 Apophis Noticias</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
:root{
  --bg:#f4e3b2;
  --card:#fff8dc;
  --text:#222;
}

.dark{
  --bg:#121212;
  --card:#1e1e1e;
  --text:#eee;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Georgia;
  transition:.3s;
}

.header{
  background:#111;
  color:white;
  padding:15px;
  text-align:center;
  font-size:28px;
}

.nav{
  display:flex;
  justify-content:center;
  gap:15px;
  background:#222;
  padding:10px;
}
.nav button{
  color:white;
}
.nav button:hover{color:gold;}

.slider{
  position:relative;
  height:300px;
  overflow:hidden;
}
.slide{
  position:absolute;
  width:100%;
  height:100%;
  transition:opacity .5s;
}
.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.slide h2{
  position:absolute;
  bottom:10px;
  left:10px;
  background:rgba(0,0,0,.6);
  color:white;
  padding:10px;
}

.card{
  background:var(--card);
  border-left:5px solid gold;
  padding:10px;
  margin:10px;
  border-radius:10px;
  transition:.3s;
  cursor:pointer;
}
.card:hover{
  transform:scale(1.02);
  box-shadow:0 0 10px gold;
}

.ultimo{
  background:red;
  color:white;
  padding:5px;
  text-align:center;
  animation:blink 1s infinite;
}
@keyframes blink{
  50%{opacity:.5;}
}
</style>
</head>

<body>

<div class="header">𓂀 APOPHIS NOTICIAS</div>

<div class="nav">
<button onclick="verCat('politica')">Política</button>
<button onclick="verCat('deportes')">Deportes</button>
<button onclick="verCat('policiales')">Policiales</button>
<button onclick="toggleDark()">🌙</button>
</div>

<div class="ultimo" id="ultimo">ÚLTIMO MOMENTO</div>

<div class="slider" id="slider"></div>

<div class="text-center p-4 bg-yellow-200">PUBLICIDAD</div>

<div id="noticias"></div>

<script>
const API="https://apophis-noticias-backend.vercel.app";

let pagina=0;
let todas=[];

// DARK MODE
function toggleDark(){
  document.body.classList.toggle("dark");
}

// IR
function ir(id){
  location="noticia.html?id="+id;
}

function verCat(cat){
  location="categoria.html?cat="+cat;
}

// SLIDER
function crearSlider(data){
  slider.innerHTML=data.slice(0,5).map((n,i)=>`
    <div class="slide" style="opacity:${i==0?1:0}">
      ${n.imagen?`<img src="${n.imagen}">`:""}
      <h2 onclick="ir('${n._id}')">${n.titulo}</h2>
    </div>
  `).join("");

  let i=0;
  setInterval(()=>{
    const slides=document.querySelectorAll(".slide");
    slides.forEach(s=>s.style.opacity=0);
    i=(i+1)%slides.length;
    slides[i].style.opacity=1;
  },3000);
}

// CARGAR
async function cargar(){
  const res=await fetch(API+"/noticias");
  todas=await res.json();

  crearSlider(todas);

  // ÚLTIMO MOMENTO
  ultimo.innerText="ÚLTIMO: "+todas[0].titulo;

  render();
}

// RENDER
function render(){
  const chunk=todas.slice(pagina*5,(pagina+1)*5);

  noticias.innerHTML+=chunk.map(n=>`
    <div class="card" onclick="ir('${n._id}')">
      <h2>${n.titulo}</h2>
      <p>${n.contenido.substring(0,100)}...</p>
      <p>👍 ${n.likes.length} 👎 ${n.dislikes.length}</p>
    </div>
  `).join("");

  pagina++;
}

// SCROLL INFINITO
window.onscroll=()=>{
  if(window.innerHeight+window.scrollY>=document.body.offsetHeight-100){
    render();
  }
};

cargar();
</script>

</body>
</html>
