<style>
/* TU CSS ORIGINAL INTACTO */
body{margin:0;font-family:Georgia;background:#f4e3b2;color:#111;transition:.3s;}
body.dark{background:#111;color:#f0e68c;}
.header{background:black;color:gold;padding:25px;display:flex;justify-content:center;align-items:center;gap:10px;position:relative;cursor:pointer;}
.header span.title{font-size:2rem;cursor:pointer;}
.eyes{display:inline-block;font-size:1.5rem;animation:blink 4s infinite;}
@keyframes blink{0%,90%,100%{transform:scaleY(1);}95%{transform:scaleY(0.1);}}
.cat-btn{margin:5px;padding:8px 12px;border-radius:8px;background:#111;color:gold;cursor:pointer;transition:.3s;}
.cat-btn:hover{transform:scale(1.1);background:gold;color:black;}
.info-noticia{text-align:center;font-size:0.9rem;margin-bottom:10px;opacity:0.8;}
.main-layout{display:flex;max-width:1200px;margin:auto;gap:20px;}
.noticia-container{flex:3;padding:15px;background:#f4e3b2;border-radius:12px;box-shadow:0 3px 6px rgba(0,0,0,0.3);}
.sidebar{flex:1;position:sticky;top:20px;height:fit-content;}
@media(max-width:900px){.main-layout{flex-direction:column;}.sidebar{position:static;}}
.noticia-titulo{font-size:2.5rem;font-weight:bold;margin-bottom:10px;text-align:center;}
.noticia-img{width:100%;height:400px;background-size:cover;background-position:center;border-radius:12px;margin-bottom:15px;}
.noticia-texto{font-size:1.2rem;line-height:1.6;}
.titulo-comentarios{display:inline-block;background:#111;color:gold;padding:6px 12px;border-radius:8px;font-weight:bold;}
.btn-comentar{background:#111;color:gold;padding:8px 12px;border-radius:8px;margin-top:5px;cursor:pointer;}
.btn-comentar:hover{background:gold;color:black;}
.comentario{background:rgba(255,255,255,0.8);border-radius:8px;padding:8px;margin-bottom:10px;}
.relacionada-card{width:100%;height:100px;margin-bottom:10px;background-size:cover;background-position:center;border-radius:8px;cursor:pointer;position:relative;}
.relacionada-card h4{position:absolute;bottom:0;width:100%;background:rgba(0,0,0,0.6);color:gold;text-align:center;}
.ad-box{margin:20px 0;text-align:center;}
button.toggle-dark{position:fixed;bottom:10px;right:10px;background:gold;}
.reactions button{margin-right:5px;}
footer{margin-top:40px;padding:20px;text-align:center;background:#111;color:gold;}
footer a{color:gold;margin:0 10px;}
</style>
</head>

<body>

<!-- 🔥 TODO TU HTML ORIGINAL (NO TOCADO) -->
<div class="header">
  <span class="eyes">𓂀</span>
  <span class="eyes">𓁹</span>
  <span class="title" onclick="location.href='index.html'">APOPHIS NOTICIAS</span>
  <span class="eyes">𓁹</span>
  <span class="eyes">𓂀</span>
</div>

<div style="text-align:center;margin:15px;">
  <button class="cat-btn" onclick="verCat('politica')">Política</button>
  <button class="cat-btn" onclick="verCat('deportes')">Deportes</button>
  <button class="cat-btn" onclick="verCat('policiales')">Policiales</button>
  <button class="cat-btn" onclick="verCat('arte')">Arte</button>
  <button class="cat-btn" onclick="verCat('show')">Show</button>
  <button class="cat-btn" onclick="verCat('pais')">País</button>
  <button class="cat-btn" onclick="verCat('mundo')">Mundo</button>
  <button class="cat-btn" onclick="verCat('ciudad')">Ciudad</button>
</div>

<div class="main-layout">
  <div style="flex:3;">
    <div class="noticia-container" id="noticiaContainer"></div>

    <h3 style="margin-top:20px;text-align:center;">
      <span class="titulo-comentarios">COMENTARIOS</span>
    </h3>

    <div class="form-comentario">
      <input type="text" id="nombre" placeholder="Tu nombre">
      <textarea id="textoComentario" placeholder="Escribe tu comentario"></textarea>
      <div class="btn-comentar" onclick="enviarComentario()">Comentar</div>
    </div>

    <div id="comentarios"></div>
  </div>

  <div class="sidebar">
    <h3 style="text-align:center;">Relacionadas</h3>
    <div id="relacionadas"></div>
  </div>
</div>

<button class="toggle-dark" onclick="toggleDark()">🌙</button>

<!-- ✅ FOOTER -->
<footer>
  <p>© 2026 Apophis Noticias</p>
  <div>
    <a href="privacidad.html">Privacidad</a> |
    <a href="contacto.html">Contacto</a> |
    <a href="sobre.html">Sobre Nosotros</a>
  </div>
</footer>

<script>
const API="https://apophis-noticias-backend.vercel.app";
let noticiaActual="";

function toggleDark(){document.body.classList.toggle("dark");}
function verCat(cat){location.href="categoria.html?cat="+cat;}
function ir(id){location="noticia.html?id="+id;}

async function cargarNoticia(){
  const id = new URLSearchParams(window.location.search).get('id');
  if(!id) return;

  noticiaActual=id;

  const res = await fetch(API+"/noticias/"+id);
  const n = await res.json();

  const urlActual = window.location.href;

  // SEO dinámico
  document.title = n.titulo + " | Apophis Noticias";

  document.querySelector("meta[property='og:title']").setAttribute("content", n.titulo);
  document.querySelector("meta[property='og:description']").setAttribute("content", n.titulo);
  document.querySelector("meta[property='og:image']").setAttribute("content", n.imagen);
  document.querySelector("meta[property='og:url']").setAttribute("content", urlActual);

  document.querySelector("meta[name='twitter:title']").setAttribute("content", n.titulo);
  document.querySelector("meta[name='twitter:description']").setAttribute("content", n.titulo);
  document.querySelector("meta[name='twitter:image']").setAttribute("content", n.imagen);

  document.getElementById("jsonld").textContent = JSON.stringify({
    "@context": "https://schema.org",
    "@type": "NewsArticle",
    "headline": n.titulo,
    "image": [n.imagen],
    "datePublished": new Date().toISOString(),
    "author": {"@type":"Organization","name":"Apophis Noticias"},
    "publisher": {"@type":"Organization","name":"Apophis Noticias"},
    "mainEntityOfPage": {"@type":"WebPage","@id":urlActual}
  });

  const fecha = new Date(n._id.substring(0,8)*1000).toLocaleString();

  document.getElementById("noticiaContainer").innerHTML = `
    <h1 class="noticia-titulo">${n.titulo}</h1>
    <div class="info-noticia">✍️ Redacción Apophis | 🕒 ${fecha}</div>
    <div class="noticia-img" style="background-image:url('${n.imagen}')"></div>
    <div class="noticia-texto">${n.contenido}</div>
  `;
}

window.onload=cargarNoticia;
</script>

</body>
</html>
