<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Apophis Noticias</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{
  font-family:Georgia;
  margin:0;
  background:#f4e3b2;
  transition:.3s;
}
@media (prefers-color-scheme: dark){
  body{background:#111;color:white;}
}
.header{
  background:black;
  color:gold;
  padding:25px;
  text-align:center;
  font-size:2rem;
  position:sticky;
  top:0;
  z-index:10;
  cursor:pointer;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}
.eyes{
  display:inline-block;
  font-size:1.5rem;
  animation:blink 4s infinite;
}
@keyframes blink{
  0%,90%,100%{transform:scaleY(1);}
  95%{transform:scaleY(0.1);}
}
.container{max-width:1200px;margin:auto;padding:15px;}
.slider{
  margin:15px 0;
  background:red;
  color:white;
  padding:15px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}
.categorias{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}
.cat{
  background:black;
  color:white;
  padding:10px 15px;
  border-radius:8px;
  cursor:pointer;
  transition:.3s;
}
.cat:hover{background:gold;color:black;transform:scale(1.1);}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  justify-items:center;
}
.card{
  background:#fff8dc;
  padding:15px;
  border-radius:12px;
  width:100%;
  max-width:300px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  cursor:pointer;
  transition:.3s;
  text-align:center;
}
.card:hover{transform:translateY(-5px) scale(1.02);}
.card h2{
  font-size:1.5rem;
  font-weight:bold;
  color:black;
}
.btn{padding:5px 10px;border-radius:5px;margin:3px;}
.like{background:green;color:white;}
.dislike{background:red;color:white;}
</style>
</head>
<body>

<div class="header" onclick="location='index.html'">
  <span class="eyes">𓂀</span>
  <span class="eyes">𓁹</span>
  <span>APOPHIS NOTICIAS</span>
  <span class="eyes">𓁹</span>
  <span class="eyes">𓂀</span>
</div>

<div class="container">
<button onclick="abrirLogin()">Admin</button>
<div id="loginBox" style="display:none;margin-bottom:20px;">
<input id="user" placeholder="Usuario">
<input id="pass" placeholder="Pass" type="password">
<button onclick="login()">Ingresar</button>
</div>

<div id="sliderText" class="slider"></div>

<div class="categorias">
<div class="cat" onclick="cat('politica')">Política</div>
<div class="cat" onclick="cat('deportes')">Deportes</div>
<div class="cat" onclick="cat('policiales')">Policiales</div>
<div class="cat" onclick="cat('arte')">Arte</div>
<div class="cat" onclick="cat('show')">Show</div>
</div>

<div id="contenedor" class="grid"></div>
</div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
let noticias=[],i=0;

function abrirLogin(){loginBox.style.display="block";}
async function login(){
  const res=await fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user:user.value,password:pass.value})});
  const data=await res.json();
  if(data.token){localStorage.setItem("token",data.token);alert("Admin activado");location="admin.html";}
  else alert("Usuario o contraseña incorrecto");
}

async function cargar(){
  const res=await fetch(API+"/noticias");noticias=await res.json();
  contenedor.innerHTML=noticias.map(n=>`
    <div class="card">
      <h2 onclick="ir('${n._id}')">${n.titulo}</h2>
      <p>👁 ${n.vistas}</p>
      <button class="btn like" onclick="like('${n._id}')">👍 ${n.likes}</button>
      <button class="btn dislike" onclick="dislike('${n._id}')">👎 ${n.dislikes}</button>
    </div>
  `).join("");
  slider();
}

function slider(){
  setInterval(()=>{
    if(noticias.length===0) return;
    const n=noticias[i];
    sliderText.innerHTML=`<div onclick="ir('${n._id}')">🔴 ${n.titulo}</div>`;
    i=(i+1)%noticias.length;
  },4000);
}

async function like(id){await fetch(API+"/noticias/"+id+"/like",{method:"POST"});cargar();}
async function dislike(id){await fetch(API+"/noticias/"+id+"/dislike",{method:"POST"});cargar();}
function ir(id){location="noticia.html?id="+id;}
function cat(c){location="categoria.html?cat="+c;}
cargar();
</script>

</body>
</html>
