<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Apophis Noticias</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0;font-family:Georgia;background:#f4e3b2;}
@media (prefers-color-scheme: dark){body{background:#111;color:white;}}

.container{max-width:1200px;margin:auto;}

.header{background:black;color:gold;padding:25px;text-align:center;font-size:2rem;}

.eye::after{
content:"●";
position:absolute;
animation:moveEye 3s infinite;
}
@keyframes moveEye{
0%{transform:translate(0,0);}
50%{transform:translate(3px,0);}
100%{transform:translate(0,0);}
}

.slider{
margin:15px;
background:red;
color:white;
padding:15px;
text-align:center;
border-radius:10px;
cursor:pointer;
}

.cat{background:black;color:white;padding:10px;border-radius:6px;margin:5px;display:inline-block;cursor:pointer;}
.cat:hover{background:gold;color:black;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;padding:15px;}
.card{background:#fff8dc;padding:10px;border-radius:10px;cursor:pointer;}
</style>
</head>

<body>

<div class="header">𓂀 APOPHIS NOTICIAS 𓂀</div>

<div class="container">

<div id="sliderText" class="slider"></div>

<div>
<span class="cat" onclick="cat('politica')">Política</span>
<span class="cat" onclick="cat('deportes')">Deportes</span>
<span class="cat" onclick="cat('policiales')">Policiales</span>
<span class="cat" onclick="cat('arte')">Arte</span>
<span class="cat" onclick="cat('show')">Show</span>
</div>

<div id="contenedor" class="grid"></div>

</div>

<script>
const API="https://apophis-noticias-backend.vercel.app";

let noticias=[];
let i=0;

async function cargar(){
  const res=await fetch(API+"/noticias");
  const data=await res.json();
  noticias=data;

  contenedor.innerHTML=data.map(n=>`
    <div class="card" onclick="ir('${n._id}')">
      <h3>${n.titulo}</h3>
      <p>${n.contenido.substring(0,100)}</p>
      <p>👁 ${n.vistas} 👍 ${n.likes} 👎 ${n.dislikes}</p>
    </div>
  `).join("");

  slider();
}

function slider(){
  setInterval(()=>{
    const n=noticias[i];
    sliderText.innerHTML=`<div onclick="ir('${n._id}')">🔴 ${n.titulo}</div>`;
    i=(i+1)%noticias.length;
  },4000);
}

function ir(id){location="noticia.html?id="+id;}
function cat(c){location="categoria.html?cat="+c;}

cargar();
</script>

</body>
</html>
