<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>𓂀 Apophis Noticias | Rosario</title>
<meta name="description" content="Noticias de Rosario, Argentina y el mundo.">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background:#f4e3b2;
  font-family: serif;
}

/* portada principal */
.hero{
  position:relative;
  overflow:hidden;
  border-radius:12px;
}
.hero img{
  width:100%;
  height:300px;
  object-fit:cover;
}
.hero h2{
  position:absolute;
  bottom:0;
  background:rgba(0,0,0,0.6);
  color:white;
  width:100%;
  padding:10px;
}

/* tarjetas */
.card{
  background:#fff7d1;
  border:1px solid #d4af37;
  padding:10px;
  border-radius:10px;
  transition:.3s;
}
.card:hover{
  transform:scale(1.02);
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.modal-content{
  background:#fff7d1;
  padding:20px;
  border-radius:10px;
  width:300px;
}
</style>

</head>

<body>

<header class="bg-yellow-600 text-center p-5">
  <h1 class="text-4xl font-bold">𓂀 Apophis Noticias 𓂀</h1>

  <button onclick="abrirLogin()" class="mt-2 bg-black text-white px-3 py-1 rounded">
    Admin
  </button>
</header>

<!-- PORTADA -->
<section class="p-4">
  <div id="principal"></div>
</section>

<!-- SECCIONES -->
<section class="p-4 grid md:grid-cols-3 gap-4" id="secundarias"></section>

<!-- LOGIN -->
<div id="login" class="modal">
  <div class="modal-content">
    <h2>Admin</h2>
    <input id="user" placeholder="Usuario" class="w-full border mb-2">
    <input id="pass" type="password" placeholder="Contraseña" class="w-full border mb-2">
    <button onclick="login()" class="bg-yellow-600 w-full">Ingresar</button>
  </div>
</div>

<!-- PANEL -->
<div id="admin" class="modal">
  <div class="modal-content">
    <h2>Crear noticia</h2>
    <input id="titulo" placeholder="Título" class="w-full border mb-2">
    <textarea id="contenido" class="w-full border mb-2"></textarea>
    <select id="categoria" class="w-full border mb-2">
      <option value="politica">Política</option>
      <option value="deportes">Deportes</option>
      <option value="policiales">Policiales</option>
      <option value="arte">Arte</option>
      <option value="show">Show</option>
    </select>
    <input type="file" id="img">
    <button onclick="crear()" class="bg-green-600 w-full text-white mt-2">Publicar</button>
  </div>
</div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
let admin=false;

// CARGAR
async function cargar(){
  const res=await fetch(API+"/noticias");
  const data=await res.json();

  if(!data.length) return;

  // PRINCIPAL
  const p=data[0];
  document.getElementById("principal").innerHTML=`
    <div class="hero" onclick="ir('${p._id}')">
      <img src="${p.imagen || ''}">
      <h2>${p.titulo}</h2>
    </div>
  `;

  // SECUNDARIAS
  document.getElementById("secundarias").innerHTML=
  data.slice(1).map(n=>`
    <div class="card">
      ${admin ? `<button onclick="eliminar('${n._id}')">X</button>`:""}
      <div onclick="ir('${n._id}')">
        <h3>${n.titulo}</h3>
        <p>${n.contenido.substring(0,80)}...</p>
      </div>
    </div>
  `).join("");
}

// IR
function ir(id){
  location="noticia.html?id="+id;
}

// LOGIN
function abrirLogin(){login.style.display="flex";}
async function login(){
  const res=await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user:user.value,pass:pass.value})
  });

  if(res.ok){
    admin=true;
    login.style.display="none";
    admin.style.display="flex";
    cargar();
  }
}

// CREAR
async function crear(){
  let url="";

  if(img.files[0]){
    const fd=new FormData();
    fd.append("file",img.files[0]);

    const r=await fetch(API+"/upload",{method:"POST",body:fd});
    const d=await r.json();
    url=d.url;
  }

  await fetch(API+"/noticias",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      titulo:titulo.value,
      contenido:contenido.value,
      categoria:categoria.value,
      imagen:url
    })
  });

  alert("Publicada");
  admin.style.display="none";
  cargar();
}

// DELETE
async function eliminar(id){
  await fetch(API+"/noticias/"+id,{method:"DELETE"});
  cargar();
}

cargar();
</script>

</body>
</html>
