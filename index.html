<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apophis Noticias - Diario de Rosario</title>
<meta name="description" content="Noticias de Rosario, Santa Fe, Argentina y el mundo. Deportes, política, arte, policiales y entretenimiento.">
<!-- Google Analytics básico -->
<script async src="https://www.googletagmanager.com/gtag/js?id=UA-XXXXXX-X"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'UA-XXXXXX-X');
</script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:linear-gradient(#fdf6e3,#f4e3b2);font-family:"Papyrus",fantasy;color:#000;margin:0;}
header{background:#d4af37;box-shadow:0 4px 8px rgba(0,0,0,0.3);padding:1rem;text-align:center;}
.card{background:#fff7d1;border:2px solid #d4af37;border-radius:12px;padding:1rem;transition:transform 0.3s,box-shadow 0.3s,opacity 0.5s;opacity:0;position:relative;}
.card.show{opacity:1;}
.card:hover{transform:scale(1.05);box-shadow:0 8px 20px rgba(212,175,55,0.5);}
button{cursor:pointer;transition:transform 0.2s;}
button:hover{transform:scale(1.05);}
input{border:1px solid #d4af37;border-radius:6px;padding:0.3rem;width:100%;}
.filtroBtn{background:#000;color:#fff;padding:0.5rem 1rem;border-radius:6px;margin-right:0.5rem;margin-bottom:0.5rem;}
</style>
</head>
<body>
<header>
<h1 class="text-4xl font-bold">𓂀 Apophis Noticias 𓂀</h1>
<p>Noticias de la ciudad, provincia, país y mundo</p>
<button onclick="mostrarLogin()" class="filtroBtn">Admin Login</button>
<div style="margin-top:0.5rem;">
  <button class="filtroBtn" onclick="filtrar('')">Todas</button>
  <button class="filtroBtn" onclick="filtrar('deportes')">Deportes</button>
  <button class="filtroBtn" onclick="filtrar('politica')">Política</button>
  <button class="filtroBtn" onclick="filtrar('policiales')">Policiales</button>
  <button class="filtroBtn" onclick="filtrar('arte')">Arte</button>
  <button class="filtroBtn" onclick="filtrar('show')">Entretenimiento</button>
</div>
</header>

<!-- LOGIN MODAL -->
<div id="modalAdmin" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;">
  <div style="background:#fff7d1;padding:2rem;border-radius:12px;max-width:400px;width:90%;">
    <h2 style="text-align:center;font-size:1.5rem;margin-bottom:1rem;">Admin Login</h2>
    <input id="adminUser" type="text" placeholder="Usuario" style="width:100%;margin-bottom:0.5rem;padding:0.5rem;">
    <input id="adminPass" type="password" placeholder="Contraseña" style="width:100%;margin-bottom:0.5rem;padding:0.5rem;">
    <button onclick="loginAdmin()" style="width:100%;background:#d4af37;color:white;padding:0.5rem;border:none;border-radius:6px;">Ingresar</button>
    <p id="adminError" style="color:red;margin-top:0.5rem;text-align:center;"></p>
  </div>
</div>

<main id="contenedor" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 p-6">
<p>Cargando noticias...</p>
</main>

<script>
const API = "https://apophis-noticias-backend.vercel.app";
let isAdmin=false;

async function cargar(categoria=''){
  try{
    const res = await fetch(API+"/noticias"+(categoria?`?categoria=${categoria}`:''));
    const data = await res.json();
    const contenedor = document.getElementById("contenedor");
    if(!data.length){ contenedor.innerHTML="<p>No hay noticias</p>"; return; }

    contenedor.innerHTML = data.map((n,i)=>`
      <div class="card" data-id="${n._id}" style="transition-delay:${i*100}ms">
        <h2 class="text-xl font-bold mb-2">${n.titulo}</h2>
        ${n.imagen?`<img src="${n.imagen}" style="width:100%;border-radius:8px;margin-bottom:0.5rem;">`:''}
        <p class="mb-3">${n.contenido}</p>
        <button onclick="like('${n._id}')">❤️ ${n.likes}</button>
        <button onclick="dislike('${n._id}')" style="margin-left:0.5rem;">👎 ${n.dislikes}</button>
        <div style="margin-top:0.5rem;">
          <input id="c-${n._id}" placeholder="Comentario">
          <button onclick="coment('${n._id}')">Enviar</button>
        </div>
      </div>
    `).join("");

    document.querySelectorAll(".card").forEach(card=>card.classList.add("show"));

    if(isAdmin) mostrarBotonesAdmin();

  }catch(err){ console.error(err); contenedor.innerHTML="Error conectando con el servidor"; }
}

function filtrar(c){ cargar(c); }

function mostrarLogin(){ document.getElementById("modalAdmin").style.display="flex"; }
async function loginAdmin(){
  const user=document.getElementById("adminUser").value;
  const pass=document.getElementById("adminPass").value;
  try{
    const res = await fetch(`${API}/login`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({user,pass})});
    const data = await res.json();
    if(data.ok){ isAdmin=true; document.getElementById("modalAdmin").style.display="none"; alert("¡Bienvenido admin!"); mostrarBotonesAdmin(); }
    else document.getElementById("adminError").innerText="Usuario o contraseña incorrecta";
  }catch(err){ console.error(err); document.getElementById("adminError").innerText="Error de conexión"; }
}

function mostrarBotonesAdmin(){
  document.querySelectorAll(".card").forEach(card=>{
    const id=card.dataset.id;
    if(card.querySelector(".deleteBtn")) return;
    let btnDelete=document.createElement("button");
    btnDelete.innerText="Eliminar";
    btnDelete.className="deleteBtn";
    btnDelete.style.background="#e74c3c";
    btnDelete.style.color="#fff";
    btnDelete.style.marginTop="0.5rem";
    btnDelete.style.border="none";
    btnDelete.style.borderRadius="4px";
    btnDelete.style.padding="0.3rem 0.6rem";
    btnDelete.onclick=()=>eliminarNoticia(id);
    card.appendChild(btnDelete);
  });
}

async function eliminarNoticia(id){
  if(!isAdmin) return alert("No autorizado");
  if(!confirm("¿Seguro querés eliminar esta noticia?")) return;
  await fetch(`${API}/noticias/${id}`,{method:"DELETE"});
  cargar();
}

async function like(id){ await fetch(`${API}/noticias/${id}/like`,{method:"POST"}); cargar(); }
async function dislike(id){ await fetch(`${API}/noticias/${id}/dislike`,{method:"POST"}); cargar(); }
async function coment(id){
  const texto=document.getElementById("c-"+id).value;
  if(!texto) return alert("Escribí algo");
  await fetch(`${API}/noticias/${id}/comentario`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({texto})});
  cargar();
}

// Cargar al inicio
cargar();
</script>
</body>
</html>
