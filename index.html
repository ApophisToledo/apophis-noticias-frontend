<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>𓂀 Apophis Noticias</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#f4e3b2;font-family:Georgia;}
.card{
  background:#fff8dc;
  border-left:5px solid gold;
  padding:15px;
  margin:15px;
  border-radius:10px;
  transition:.3s;
}
.card:hover{
  transform:scale(1.03);
  box-shadow:0 0 15px gold;
}
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999999;
}
</style>
</head>

<body>

<h1 class="text-3xl text-center p-4">𓂀 Apophis Noticias</h1>

<div class="text-center space-x-2">
<button onclick="abrirLogin()" class="bg-black text-white px-4 py-2">Login</button>
<button onclick="abrirRegister()" class="bg-yellow-600 text-white px-4 py-2">Registro</button>
</div>

<div class="text-center my-4">
<button onclick="verCat('politica')">Política</button>
<button onclick="verCat('deportes')">Deportes</button>
<button onclick="verCat('policiales')">Policiales</button>
</div>

<div id="noticias"></div>

<div class="text-center p-4 bg-yellow-200">PUBLICIDAD</div>

<!-- LOGIN -->
<div id="login" class="modal">
<div class="bg-white p-4">
<input id="user" placeholder="Usuario"><br>
<input id="pass" type="password" placeholder="Contraseña"><br>
<button onclick="login()">Entrar</button>
</div>
</div>

<!-- REGISTER -->
<div id="register" class="modal">
<div class="bg-white p-4">
<input id="userR" placeholder="Usuario"><br>
<input id="passR" type="password" placeholder="Contraseña"><br>
<button onclick="register()">Crear cuenta</button>
</div>
</div>

<script>
const API="https://apophis-noticias-backend.vercel.app";

function abrirLogin(){login.style.display="flex";}
function abrirRegister(){register.style.display="flex";}

async function register(){
  await fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user:userR.value,pass:passR.value})
  });
  alert("Registrado");
}

async function login(){
  const res=await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user:user.value,pass:pass.value})
  });
  const d=await res.json();
  localStorage.setItem("token",d.token);
  localStorage.setItem("user",d.user);
  alert("Logeado");
}

function verCat(cat){
  location="categoria.html?cat="+cat;
}

async function cargar(){
  const res=await fetch(API+"/noticias");
  const data=await res.json();

  noticias.innerHTML=data.map(n=>`
  <div class="card">
    ${n.imagen?`<img src="${n.imagen}">`:""}
    <h2 onclick="ir('${n._id}')">${n.titulo}</h2>
    <p>${n.contenido.substring(0,100)}...</p>
    <p>👍 ${n.likes.length} 👎 ${n.dislikes.length}</p>
  </div>
  `).join("");
}

function ir(id){
  location="noticia.html?id="+id;
}

cargar();
</script>

</body>
</html>
