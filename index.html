<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Apophis Noticias</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{margin:0;font-family:Georgia;background:#f4e3b2;color:black;transition:.3s;}
body.dark{background:#111;color:#f0e68c;}
.header{
  background:black;color:gold;padding:25px;text-align:center;font-size:2rem;
  display:flex;justify-content:center;align-items:center;gap:10px;cursor:pointer;
}
.eyes{display:inline-block;font-size:1.5rem;animation:blink 4s infinite;}
@keyframes blink{0%,90%,100%{transform:scaleY(1);}95%{transform:scaleY(0.1);}}
.container{max-width:1200px;margin:auto;padding:15px;text-align:center;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;justify-items:center;}
.card{background:#fff8dc;padding:15px;border-radius:12px;width:100%;max-width:300px;box-shadow:0 8px 20px rgba(0,0,0,0.2);cursor:pointer;transition:.3s;text-align:center;}
.card h2{font-size:1.5rem;font-weight:bold;color:black;}
.card:hover{transform:translateY(-5px) scale(1.02);}
.card.dark{background:#222;color:#f0e68c;border-left:5px solid gold;}
button.toggle-dark{position:fixed;bottom:10px;right:10px;padding:10px;border-radius:50%;background:gold;color:black;cursor:pointer;z-index:100;}
button.cat-btn{margin:5px;padding:8px 12px;border-radius:8px;border:none;background:#111;color:gold;cursor:pointer;transition:.3s;}
button.cat-btn:hover{background:gold;color:black;}
</style>
</head>
<body>

<div class="header" onclick="location='index.html'">
  <span class="eyes">𓂀</span>
  <span class="eyes">𓁹</span>
  <span>APOPHIS NOTICIAS</span>
  <span class="eyes">𓁹</span>
  <span class="eyes">𓂀</span>
</div>

<div class="container">
  <h2>Categorías</h2>
  <div id="categorias">
    <button class="cat-btn" onclick="verCat('politica')">Política</button>
    <button class="cat-btn" onclick="verCat('deportes')">Deportes</button>
    <button class="cat-btn" onclick="verCat('policiales')">Policiales</button>
    <button class="cat-btn" onclick="verCat('arte')">Arte</button>
    <button class="cat-btn" onclick="verCat('show')">Show</button>
  </div>

  <h2>Últimas Noticias</h2>
  <div id="contenedor" class="grid"></div>
</div>

<button class="toggle-dark" onclick="toggleDark()">🌙</button>

<script>
const API="https://apophis-noticias-backend.vercel.app";

function toggleDark(){
  document.body.classList.toggle("dark");
  document.querySelectorAll(".card").forEach(c=>c.classList.toggle("dark"));
}

async function cargar(){
  const res = await fetch(API+"/noticias");
  const data = await res.json();
  contenedor.innerHTML = data.map(n=>`
    <div class="card" onclick="ir('${n._id}')">
      <h2>${n.titulo}</h2>
      <p>👁 ${n.vistas}</p>
      <button onclick="event.stopPropagation();like('${n._id}')">👍 ${n.likes}</button>
      <button onclick="event.stopPropagation();dislike('${n._id}')">👎 ${n.dislikes}</button>
    </div>
  `).join("");
}

async function like(id){await fetch(API+"/noticias/"+id+"/like",{method:"POST"});cargar();}
async function dislike(id){await fetch(API+"/noticias/"+id+"/dislike",{method:"POST"});cargar();}
function ir(id){location="noticia.html?id="+id;}
function verCat(cat){location="categoria.html?cat="+cat;}

window.onload=cargar;
</script>

</body>
</html>
