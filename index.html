<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>𓂀 Apophis Noticias</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background:#f4e3b2;
  font-family:Georgia;
  margin:0;
}

/* HEADER */
.header{
  background:#111;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* NAV */
.nav{
  display:flex;
  justify-content:center;
  gap:15px;
  background:#222;
  padding:10px;
}
.nav button{
  color:white;
}
.nav button:hover{
  color:gold;
}

/* GRID */
.grid{
  max-width:1200px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:#fff8dc;
  border-left:5px solid gold;
  padding:15px;
  border-radius:10px;
  transition:.3s;
  cursor:pointer;
}
.card:hover{
  transform:scale(1.02);
  box-shadow:0 0 10px gold;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* PANEL ADMIN */
.panel{
  position:fixed;
  right:0;
  top:0;
  width:320px;
  height:100%;
  background:white;
  padding:15px;
  overflow:auto;
  display:none;
}

/* NOTIF */
.notif{
  position:fixed;
  bottom:20px;
  right:20px;
  background:black;
  color:white;
  padding:10px;
  border-radius:5px;
  display:none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>𓂀 APOPHIS NOTICIAS</div>

  <div id="userPanel">
    <button onclick="abrirLogin()">Ingresar</button>
    <button onclick="abrirRegister()">Registro</button>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="verCat('politica')">Política</button>
  <button onclick="verCat('deportes')">Deportes</button>
  <button onclick="verCat('policiales')">Policiales</button>
  <button onclick="verCat('show')">Show</button>
</div>

<!-- BOTÓN ADMIN -->
<div class="text-center mt-3">
  <button id="btnAdmin" onclick="abrirAdmin()" style="display:none;background:black;color:white;padding:6px 10px;border-radius:5px">
    ✍️ Panel Admin
  </button>
</div>

<!-- PUBLICIDAD -->
<div class="text-center p-3 bg-yellow-200 mt-2">PUBLICIDAD</div>

<!-- NOTICIAS -->
<div id="noticias" class="grid"></div>

<!-- LOGIN -->
<div id="login" class="modal">
<div class="bg-white p-4 rounded">
<input id="user" placeholder="Usuario" class="border w-full mb-2">
<input id="pass" type="password" placeholder="Contraseña" class="border w-full mb-2">
<button onclick="login()" class="bg-black text-white w-full">Entrar</button>
</div>
</div>

<!-- REGISTER -->
<div id="register" class="modal">
<div class="bg-white p-4 rounded">
<input id="userR" placeholder="Usuario" class="border w-full mb-2">
<input id="passR" type="password" class="border w-full mb-2">
<button onclick="register()" class="bg-yellow-600 text-white w-full">Crear</button>
</div>
</div>

<!-- PANEL ADMIN -->
<div id="adminPanel" class="panel">
<h2 class="text-xl mb-2">Panel Admin</h2>

<input id="titulo" placeholder="Título" class="border w-full mb-2">
<textarea id="contenido" class="border w-full mb-2"></textarea>
<select id="categoria" class="border w-full mb-2">
<option value="politica">Política</option>
<option value="deportes">Deportes</option>
<option value="policiales">Policiales</option>
<option value="show">Show</option>
</select>

<input type="file" id="img" class="mb-2">

<button onclick="crear()" class="bg-green-600 text-white w-full mb-3">Publicar</button>

<h3>Tus noticias</h3>
<div id="listaAdmin"></div>

<button onclick="cerrarAdmin()" class="bg-red-600 text-white w-full mt-3">Cerrar</button>
</div>

<!-- NOTIFICACIONES -->
<div id="notif" class="notif"></div>

<script>
const API="https://apophis-noticias-backend.vercel.app";

// NOTIFICACIONES
function noti(msg){
  notif.innerText=msg;
  notif.style.display="block";
  setTimeout(()=>notif.style.display="none",2000);
}

// LOGIN
function abrirLogin(){login.style.display="flex";}
function abrirRegister(){register.style.display="flex";}

async function register(){
  await fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user:userR.value,pass:passR.value})
  });
  noti("Usuario creado");
}

async function login(){
  const res=await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user:user.value,pass:pass.value})
  });

  if(!res.ok){alert("Error login");return;}

  const d=await res.json();
  localStorage.setItem("token",d.token);
  localStorage.setItem("user",d.user);

  login.style.display="none";
  mostrarUsuario();
}

// LOGOUT
function logout(){
  localStorage.clear();
  location.reload();
}

// MOSTRAR USUARIO
function mostrarUsuario(){
  const u=localStorage.getItem("user");

  if(u){
    userPanel.innerHTML=`
      👤 ${u}
      <button onclick="logout()">Salir</button>
    `;

    if(u==="admin"){
      btnAdmin.style.display="inline-block";
    }
  }
}

// ADMIN
function abrirAdmin(){
  adminPanel.style.display="block";
  cargarAdmin();
}
function cerrarAdmin(){
  adminPanel.style.display="none";
}

// CREAR NOTICIA
async function crear(){
  let url="";

  if(img.files[0]){
    const fd=new FormData();
    fd.append("file",img.files[0]);

    const r=await fetch(API+"/upload",{method:"POST",body:fd});
    const d=await r.json();
    url=d.url;
  }

  await fetch(API+"/noticias",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:localStorage.getItem("token")
    },
    body:JSON.stringify({
      titulo:titulo.value,
      contenido:contenido.value,
      categoria:categoria.value,
      imagen:url
    })
  });

  noti("Publicada");
  cargar();
  cargarAdmin();
}

// LISTA ADMIN
async function cargarAdmin(){
  const res=await fetch(API+"/noticias");
  const data=await res.json();
  const u=localStorage.getItem("user");

  listaAdmin.innerHTML=data
    .filter(n=>n.autor===u)
    .map(n=>`
      <div>
        ${n.titulo}
        <button onclick="eliminar('${n._id}')">❌</button>
      </div>
    `).join("");
}

// ELIMINAR
async function eliminar(id){
  await fetch(API+"/noticias/"+id,{
    method:"DELETE",
    headers:{Authorization:localStorage.getItem("token")}
  });
  cargarAdmin();
  cargar();
}

// CARGAR NOTICIAS
async function cargar(){
  const res=await fetch(API+"/noticias");
  const data=await res.json();

  noticias.innerHTML=data.map(n=>`
    <div class="card" onclick="ir('${n._id}')">
      <h2>${n.titulo}</h2>
      <p>${n.contenido.substring(0,100)}...</p>
      <p>👁️ ${n.vistas} 👍 ${n.likes.length}</p>
    </div>
  `).join("");
}

// IR
function ir(id){
  location="noticia.html?id="+id;
}

// CATEGORIA
function verCat(cat){
  location="categoria.html?cat="+cat;
}

// INIT
mostrarUsuario();
cargar();
</script>

</body>
</html>
