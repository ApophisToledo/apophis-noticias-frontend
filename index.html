<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apophis Noticias | Rosario y Argentina</title>

<meta name="description" content="Noticias de Rosario, Argentina y el mundo. Política, deportes, policiales y más.">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background: linear-gradient(#fdf6e3,#f4e3b2);
  font-family: serif;
}

/* 🟡 TARJETAS ANIMADAS */
.card{
  background:#fff7d1;
  border:2px solid #d4af37;
  border-radius:14px;
  padding:15px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.card:hover{
  transform: translateY(-5px) scale(1.02);
  box-shadow:0 10px 25px rgba(212,175,55,0.5);
}

/* brillo egipcio */
.card::before{
  content:"";
  position:absolute;
  top:-100%;
  left:0;
  width:100%;
  height:300%;
  background:linear-gradient(transparent,rgba(255,255,255,0.4),transparent);
  transform:rotate(25deg);
  transition:0.5s;
}

.card:hover::before{
  top:100%;
}

/* modal */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:#fff7d1;
  padding:20px;
  border-radius:10px;
  width:300px;
  position:relative;
}

.close{
  position:absolute;
  top:5px;
  right:10px;
  cursor:pointer;
  font-size:20px;
}
</style>

</head>

<body>

<!-- HEADER -->
<header class="bg-yellow-600 text-center p-5 shadow-lg">
  <h1 class="text-4xl font-bold">𓂀 Apophis Noticias</h1>
  <p>Rosario | Argentina | Mundo</p>

  <!-- BOTON LOGIN -->
  <button onclick="abrirLogin()" class="mt-3 bg-black text-white px-4 py-1 rounded hover:bg-gray-800">
    Admin
  </button>

  <!-- BUSCADOR -->
  <div class="mt-3">
    <input id="buscador" placeholder="Buscar..." class="p-2 rounded border">
  </div>
</header>

<!-- MODAL LOGIN -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="cerrarLogin()">✖</span>

    <h2 class="text-xl mb-2">Login Admin</h2>

    <input id="user" placeholder="Usuario" class="w-full mb-2 p-1 border"><br>
    <input id="pass" type="password" placeholder="Contraseña" class="w-full mb-2 p-1 border"><br>

    <button onclick="login()" class="bg-yellow-600 w-full py-1">Ingresar</button>
  </div>
</div>

<!-- CONTENEDOR -->
<main id="contenedor" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6 p-6">
  <p>Cargando noticias...</p>
</main>

<script>
const API = "https://apophis-noticias-backend.vercel.app";
let noticiasGlobal=[];

// 🔹 CARGAR
async function cargar(){
  const res = await fetch(API+"/noticias");
  const data = await res.json();

  noticiasGlobal = data;

  render(data);
}

// 🔹 RENDER TARJETAS
function render(data){

  if(!data.length){
    document.getElementById("contenedor").innerHTML = "No hay noticias";
    return;
  }

  document.getElementById("contenedor").innerHTML =
  data.map(n => `
    <div class="card">

      ${n.imagen ? `<img src="${n.imagen}" class="mb-2 rounded">`:""}

      <h2 class="text-xl font-bold">${n.titulo}</h2>
      <p>${n.contenido.substring(0,100)}...</p>

      <p class="text-sm mt-2">👁 ${n.vistas || 0}</p>

      <div class="flex gap-2 mt-2">
        <button onclick="like('${n._id}')" class="bg-green-600 text-white px-2 rounded">
          👍 ${n.likes}
        </button>

        <button onclick="dislike('${n._id}')" class="bg-red-600 text-white px-2 rounded">
          👎 ${n.dislikes || 0}
        </button>
      </div>

      <!-- COMENTARIOS -->
      <div class="mt-3">
        <input id="c-${n._id}" placeholder="Comentario..." class="w-full border p-1 mb-1">
        <button onclick="coment('${n._id}')" class="bg-yellow-500 w-full py-1 rounded">
          Enviar
        </button>

        <div class="text-sm mt-2">
          ${n.comentarios.map(c=>`<p>• ${c.texto}</p>`).join("")}
        </div>
      </div>

    </div>
  `).join("");
}

// 🔹 BUSCADOR
document.getElementById("buscador").addEventListener("input", e=>{
  const t = e.target.value.toLowerCase();
  const filtradas = noticiasGlobal.filter(n =>
    n.titulo.toLowerCase().includes(t)
  );
  render(filtradas);
});

// 🔹 LOGIN
function abrirLogin(){
  document.getElementById("modal").style.display="flex";
}

function cerrarLogin(){
  document.getElementById("modal").style.display="none";
}

async function login(){
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  const res = await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({user,pass})
  });

  if(res.ok){
    alert("Login correcto");
    cerrarLogin();
  }else{
    alert("Error");
  }
}

// 🔹 LIKE
async function like(id){
  await fetch(`${API}/noticias/${id}/like`,{method:"POST"});
  cargar();
}

// 🔹 DISLIKE
async function dislike(id){
  await fetch(`${API}/noticias/${id}/dislike`,{method:"POST"});
  cargar();
}

// 🔹 COMENTARIO
async function coment(id){
  const texto = document.getElementById("c-"+id).value;

  if(!texto) return alert("Escribí algo");

  await fetch(`${API}/noticias/${id}/comentario`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({texto})
  });

  cargar();
}

cargar();
</script>

</body>
</html>
