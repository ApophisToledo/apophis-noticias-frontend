<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apophis Noticias</title>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6641245592697930"
crossorigin="anonymous"></script>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0;font-family:Georgia;background:#f4e3b2;color:#111;transition:.3s;}
body.dark{background:#111;color:#f0e68c;}

.header{
  background:black;color:gold;padding:25px;
  display:flex;justify-content:center;align-items:center;
  position:relative;
}

.title{font-size:2rem;}

.admin-btn{
  position:absolute;right:15px;
  background:gold;color:black;padding:6px;border-radius:8px;
}

.container{
  max-width:1000px;margin:auto;padding:15px;text-align:center;
}

.cat-btn{
  margin:5px;
  padding:8px 12px;
  border-radius:8px;
  border:none;
  background:#111;
  color:gold;
}

.cat-btn:hover{
  background:gold;
  color:black;
}

.card{
  background:#fff8dc;padding:15px;border-radius:12px;margin-bottom:10px;
}
body.dark .card{background:#222;}
</style>
</head>

<body>

<div class="header">
  <span class="title">APOPHIS NOTICIAS</span>
  <button class="admin-btn" onclick="loginAdmin()">Admin</button>
</div>

<div class="container">

<h3 id="visitas"></h3>

<!-- ✅ CATEGORÍAS -->
<div>
  <button class="cat-btn" onclick="verCat('politica')">Política</button>
  <button class="cat-btn" onclick="verCat('deportes')">Deportes</button>
  <button class="cat-btn" onclick="verCat('policiales')">Policiales</button>
  <button class="cat-btn" onclick="verCat('arte')">Arte</button>
  <button class="cat-btn" onclick="verCat('show')">Show</button>
  <button class="cat-btn" onclick="verCat('pais')">País</button>
  <button class="cat-btn" onclick="verCat('mundo')">Mundo</button>
  <button class="cat-btn" onclick="verCat('ciudad')">Ciudad</button>
</div>

<h2>Últimas Noticias</h2>
<div id="contenedor"></div>

</div>

<script>
const API="https://apophis-noticias-backend.vercel.app";

function loginAdmin(){
  const user=prompt("Usuario");
  const pass=prompt("Contraseña");

  if((user==="Apophis"&&pass==="1234")||(user==="Benja357"&&pass==="abcd")){
    location="admin.html";
  }
}

async function visitas(){
  const r=await fetch(API+"/visitas");
  const d=await r.json();
  visitas.innerText="👁 "+d.visitas;
}

async function cargar(){
  const r=await fetch(API+"/noticias");
  const d=await r.json();

  contenedor.innerHTML=d.map(n=>`
    <div class="card" onclick="ir('${n._id}')">
      ${n.titulo} (${n.categoria || "sin categoría"})
    </div>
  `).join("");
}

function ir(id){location="noticia.html?id="+id;}
function verCat(cat){location="categoria.html?cat="+cat;}

window.onload=()=>{
  visitas();
  cargar();
};
</script>

</body>
</html>
