<!DOCTYPE html>
<html lang="es">
<head>

<title>Apophis Noticias | Rosario, Argentina y el Mundo</title>

<meta name="description" content="Últimas noticias de Rosario, Argentina y el mundo. Política, deportes, policiales y más.">

<meta name="keywords" content="noticias rosario, argentina, politica, deportes, policiales">

<meta name="robots" content="index, follow">

<!-- OPEN GRAPH -->
<meta property="og:title" content="Apophis Noticias">
<meta property="og:description" content="Portal de noticias de Rosario y Argentina">
<meta property="og:type" content="website">

<!-- TWITTER -->
<meta name="twitter:card" content="summary_large_image">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-yellow-100">

<header class="p-5 bg-yellow-600 text-center">
<h1 class="text-3xl">Apophis Noticias</h1>
<p>Noticias de Rosario, Argentina y el mundo</p>

<div class="flex justify-center gap-3 mt-3">
<button onclick="cat('politica')">Política</button>
<button onclick="cat('deportes')">Deportes</button>
<button onclick="cat('policiales')">Policiales</button>
<button onclick="cat('arte')">Arte</button>
<button onclick="cat('show')">Show</button>
</div>

<input id="buscador" placeholder="Buscar noticias..." class="mt-3">
</header>

<!-- ANUNCIO -->
<div class="text-center p-3 bg-white">ANUNCIO</div>

<div id="principal" class="p-5"></div>

<div class="p-5">
<h2>🔥 Tendencias</h2>
<div id="ranking"></div>
</div>

<div id="contenedor" class="grid md:grid-cols-3 gap-4 p-5"></div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
let noticias=[];

async function cargar(){
  const res = await fetch(API+"/noticias");
  noticias = await res.json();
  render(noticias);

  const r = await fetch(API+"/ranking");
  const rank = await r.json();
  document.getElementById("ranking").innerHTML =
    rank.map(n=>`<p onclick="ir('${n._id}')">${n.titulo}</p>`).join("");
}

function render(data){
  if(!data.length) return;

  const p=data[0];

  document.getElementById("principal").innerHTML=`
    <div onclick="ir('${p._id}')">
      <h2 class="text-2xl">${p.titulo}</h2>
      <p>${p.contenido.substring(0,150)}...</p>
    </div>
  `;

  document.getElementById("contenedor").innerHTML=
  data.slice(1).map(n=>`
    <div onclick="ir('${n._id}')">
      <h3>${n.titulo}</h3>
      <p>${n.contenido.substring(0,80)}...</p>
    </div>
  `).join("");
}

function ir(id){
  window.location="noticia.html?id="+id;
}

function cat(c){
  window.location="categoria.html?cat="+c;
}

document.getElementById("buscador").addEventListener("input",e=>{
  const t=e.target.value.toLowerCase();
  render(noticias.filter(n=>n.titulo.toLowerCase().includes(t)));
});

cargar();
</script>

</body>
</html>
