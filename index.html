<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Apophis Noticias</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#f4e3b2;font-family:Georgia;}
.header{background:black;color:white;padding:20px;text-align:center;font-size:2rem;}
.urgente{background:red;color:white;padding:10px;text-align:center;font-weight:bold;animation:blink 1s infinite;}
@keyframes blink{50%{opacity:0;}}
</style>
</head>
<body>

<div class="header">𓂀 Apophis Noticias</div>
<div id="urgente" class="urgente"></div>

<div style="padding:10px;">
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Clave">
<button onclick="login()">Admin</button>
</div>

<script>
const API="https://apophis-noticias-backend.vercel.app";

async function login(){
  const res = await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user:user.value,password:pass.value})
  });

  const data = await res.json();

  if(data.token){
    localStorage.setItem("token", data.token);
    location="admin.html";
  }else{
    alert("Error login");
  }
}

// 🔴 ÚLTIMO MOMENTO
async function urgente(){
  const res = await fetch(API+"/noticias/urgente");
  const n = await res.json();
  if(n) urgenteDiv.innerText="🔴 ÚLTIMO MOMENTO: "+n.titulo;
}
urgente();
</script>

</body>
</html>
