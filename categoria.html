<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Categoría</title>
</head>
<body>

<button onclick="location='index.html'">Inicio</button>

<h2 id="titulo"></h2>

<div id="contenedor"></div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
const cat=new URLSearchParams(location.search).get("cat");

titulo.innerText="Categoría: "+cat;

async function cargar(){
  const res=await fetch(API+"/noticias/categoria/"+cat);
  const data=await res.json();

  contenedor.innerHTML=data.slice(0,10).map(n=>`
    <div onclick="location='noticia.html?id=${n._id}'">
      ${n.titulo} 👁 ${n.vistas}
    </div>
  `).join("");
}

cargar();
</script>

</body>
</html>
