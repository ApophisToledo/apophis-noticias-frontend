<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Categoría</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#f4e3b2;font-family:Georgia;margin:0;padding:10px;}
.header{background:#111;color:white;padding:15px;display:flex;justify-content:space-between;align-items:center;}
.nav{display:flex;justify-content:center;gap:10px;background:#222;padding:10px;}
.nav button{color:white;cursor:pointer;}
.nav button:hover{color:gold;}
.grid{max-width:1200px;margin:auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;padding:15px;}
.card{background:#fff8dc;border-left:5px solid gold;padding:15px;border-radius:10px;cursor:pointer;transition:.3s;opacity:0;transform:translateY(20px);animation:fadeInUp 0.5s forwards;}
@keyframes fadeInUp{to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>𓂀 Apophis Noticias</div>
  <div>
    <button onclick="volverInicio()" class="bg-black text-white px-2 py-1 rounded">← Inicio</button>
  </div>
</div>

<!-- NAV CATEGORIAS -->
<div class="nav">
  <button onclick="verCat('politica')">Política</button>
  <button onclick="verCat('deportes')">Deportes</button>
  <button onclick="verCat('policiales')">Policiales</button>
  <button onclick="verCat('arte')">Arte</button>
  <button onclick="verCat('show')">Show</button>
</div>

<h2 id="titulo" class="text-2xl text-center mt-4"></h2>

<div id="contenedor" class="grid"></div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
const cat=new URLSearchParams(location.search).get("cat");
titulo.innerText="Categoría: "+cat;

function volverInicio(){location="index.html";}
function verCat(c){location="categoria.html?cat="+c;}
function ir(id){location="noticia.html?id="+id;}

async function cargar(){
  const res=await fetch(API+"/noticias");
  const data=await res.json();
  const filtradas=data.filter(n=>n.categoria===cat);

  contenedor.innerHTML=filtradas.map((n,i)=>`
    <div class="card" style="animation-delay:${i*0.1}s" onclick="ir('${n._id}')">
      <h2>${n.titulo}</h2>
      <p>${n.contenido.substring(0,100)}...</p>
      <p>👁️ ${n.vistas} 👍 ${n.likes.length}</p>
    </div>
  `).join("");
}

cargar();
</script>
</body>
</html>
