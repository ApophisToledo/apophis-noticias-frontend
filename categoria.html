<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Categoría</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:Georgia;margin:0;background:#f4e3b2;transition:.3s;}
@media (prefers-color-scheme: dark){body{background:#111;color:white;}}
.header{
  background:black;color:gold;padding:25px;text-align:center;font-size:2rem;
  position:sticky;top:0;z-index:10;cursor:pointer;
  display:flex;justify-content:center;align-items:center;gap:10px;
}
.eyes{display:inline-block;font-size:1.5rem;animation:blink 4s infinite;}
@keyframes blink{0%,90%,100%{transform:scaleY(1);}95%{transform:scaleY(0.1);}}
.container{max-width:1200px;margin:auto;padding:15px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;justify-items:center;}
.card{background:#fff8dc;padding:15px;border-radius:12px;width:100%;max-width:300px;box-shadow:0 8px 20px rgba(0,0,0,0.2);cursor:pointer;transition:.3s;text-align:center;}
.card:hover{transform:translateY(-5px) scale(1.02);}
.card h2{font-size:1.5rem;font-weight:bold;color:black;}
.btn{padding:5px 10px;border-radius:5px;margin:3px;}
.like{background:green;color:white;}
.dislike{background:red;color:white;}
</style>
</head>
<body>

<div class="header" onclick="location='index.html'">
  <span class="eyes">𓂀</span>
  <span class="eyes">𓁹</span>
  <span>APOPHIS NOTICIAS</span>
  <span class="eyes">𓁹</span>
  <span class="eyes">𓂀</span>
</div>

<div class="container">
<button onclick="volverInicio()">← Inicio</button>
<h2 id="titulo" class="text-2xl text-center mt-4"></h2>
<div id="contenedor" class="grid"></div>
</div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
const catParam = new URLSearchParams(location.search).get("cat");
titulo.innerText="Categoría: "+catParam;

async function cargar(){
  const res = await fetch(API+"/noticias/categoria/"+catParam);
  const data = await res.json();
  contenedor.innerHTML = data.map(n=>`
    <div class="card" onclick="ir('${n._id}')">
      <h2>${n.titulo}</h2>
      <p>👁 ${n.vistas}</p>
      <button class="btn like" onclick="event.stopPropagation();like('${n._id}')">👍 ${n.likes}</button>
      <button class="btn dislike" onclick="event.stopPropagation();dislike('${n._id}')">👎 ${n.dislikes}</button>
    </div>
  `).join("");
}

async function like(id){await fetch(API+"/noticias/"+id+"/like",{method:"POST"});cargar();}
async function dislike(id){await fetch(API+"/noticias/"+id+"/dislike",{method:"POST"});cargar();}
function ir(id){location="noticia.html?id="+id;}
function volverInicio(){location="index.html";}

window.onload=cargar;
</script>
</body>
</html>
