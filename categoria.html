<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Categoría</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-4">

<a href="index.html">← Inicio</a>

<h1 id="titulo"></h1>
<div id="contenedor"></div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
const cat = new URLSearchParams(location.search).get("cat");

titulo.innerText=cat;

async function cargar(){
  const res=await fetch(API+"/noticias/categoria/"+cat);
  const data=await res.json();

  contenedor.innerHTML=data.map(n=>`
    <div onclick="ir('${n._id}')">
      <h2>${n.titulo}</h2>
    </div>
  `).join("");
}

function ir(id){
  location="noticia.html?id="+id;
}

cargar();
</script>

</body>
</html>
