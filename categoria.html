<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Categoría - Apophis Noticias</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#f4e3b2;font-family:serif;margin:0;padding:0;}
.header{background:#111;color:white;padding:20px;text-align:center;position:sticky;top:0;z-index:10;font-size:2rem;}
.header span{display:inline-block;margin:0 15px;animation:ojos 1.5s infinite alternate;}
@keyframes ojos{from{transform:scale(1);} to{transform:scale(1.3);}}
.button{background:black;color:white;padding:5px 10px;border-radius:5px;margin:5px;cursor:pointer;}
.button:hover{background:gold;color:black;}
.grid{max-width:1200px;margin:auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:15px;padding:15px;}
.card{background:#fff8dc;border-left:5px solid gold;padding:15px;border-radius:10px;cursor:pointer;transition:.3s;opacity:0;transform:translateY(20px);animation:fadeInUp 0.5s forwards;}
.card img{max-width:100%;border-radius:10px;margin-top:5px;}
@keyframes fadeInUp{to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div class="header"><span>𓂀</span> Apophis Noticias <span>𓂀</span></div>
<button onclick="volverInicio()" class="button">← Inicio</button>
<h2 id="titulo" class="text-2xl text-center mt-4"></h2>

<div id="contenedor" class="grid"></div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
const cat=new URLSearchParams(location.search).get("cat") || "politica";
let token=localStorage.getItem("token");
let user=localStorage.getItem("user");

titulo.innerText="Categoría: "+cat;

function volverInicio(){ location="index.html"; }
function ir(id){ location="noticia.html?id="+id; }

async function cargar(){
  const res=await fetch(API+"/noticias/categoria/"+cat);
  const data=await res.json();

  contenedor.innerHTML = data.map((n,i)=>`
    <div class="card" style="animation-delay:${i*0.1}s" onclick="ir('${n._id}')">
      <h2 class="font-bold text-lg">${n.titulo}</h2>
      ${n.imagen?`<img src="${n.imagen}">`:''}
      ${n.video?`<video src="${n.video}" controls class="w-full mt-2 mb-2"></video>`:''}
      <p>${n.contenido.substring(0,100)}...</p>
      <p>👁️ ${n.vistas} 👍 ${n.likes.length} 👎 ${n.dislikes.length}</p>
    </div>
  `).join("");
}

window.onload=cargar;
</script>

</body>
</html>
