<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Categoría</title>

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-TU_ID"
crossorigin="anonymous"></script>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0;font-family:Georgia;background:#f4e3b2;color:#111;}
body.dark{background:#111;color:#f0e68c;}

.container{max-width:900px;margin:auto;padding:15px;}

.card{background:#fff8dc;padding:15px;border-radius:12px;margin-bottom:10px;}
body.dark .card{background:#222;}

</style>
</head>

<body>

<div class="container">

<h3 id="visitas"></h3>

<!-- ADS -->
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-TU_ID"
data-ad-slot="123456"
data-ad-format="auto"></ins>

<h2 id="titulo"></h2>
<div id="contenedor"></div>

</div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
const cat=new URLSearchParams(location.search).get("cat");

titulo.innerText="Categoría: "+cat;

// VISITAS
async function visitas(){
  const r=await fetch(API+"/visitas");
  const d=await r.json();
  document.getElementById("visitas").innerText="👁 "+d.visitas;
}

async function cargar(){
  const r=await fetch(API+"/noticias/categoria/"+cat);
  const d=await r.json();

  contenedor.innerHTML=d.map(n=>`
    <div class="card" onclick="ir('${n._id}')">
      ${n.titulo}
    </div>
  `).join("");

  (adsbygoogle = window.adsbygoogle || []).push({});
}

function ir(id){location="noticia.html?id="+id;}

window.onload=()=>{
  visitas();
  cargar();
};
</script>

</body>
</html>
