<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">

<title>Categoría</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0;background:#f4e3b2;}
.header{background:black;color:gold;padding:20px;text-align:center;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;padding:15px;}
.card{height:200px;position:relative;border-radius:12px;overflow:hidden;color:white;}
.card-bg{position:absolute;width:100%;height:100%;background-size:cover;}
.card-overlay{position:absolute;width:100%;height:100%;background:linear-gradient(to top,black,transparent);}
.card h2{position:absolute;bottom:10px;padding:10px;}
</style>
</head>

<body>

<div class="header">APOPHIS NOTICIAS</div>

<div id="contenedor" class="grid"></div>

<script>
const API="https://apophis-noticias-backend.vercel.app";
const cat=new URLSearchParams(location.search).get("cat");

async function cargar(){
  const r=await fetch(API+"/noticias/categoria/"+cat);
  const d=await r.json();

  contenedor.innerHTML = d.map(n=>`
  <div class="card" onclick="location='noticia.html?id=${n._id}'">
    <div class="card-bg" style="background-image:url('${n.imagen||""}')"></div>
    <div class="card-overlay"></div>
    <h2>${n.titulo}</h2>
  </div>
  `).join("");
}

cargar();
</script>

</body>
</html>
